<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Data Futuristik v3.0</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0c1b; background: linear-gradient(to bottom, #15102a, #0f0c1b);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #fff;
        }
        .container-card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); width: 100%; max-width: 420px; text-align: center; margin-bottom: 20px;
        }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #d6c7ff; letter-spacing: 0.5px; }
        .form-input { 
            width: 100%; padding: 16px; margin-bottom: 20px; text-align: center; font-weight: 600; font-size: 15px; 
            border: 2px solid #3d3463; border-radius: 12px; outline: none; background-color: #1a1535; color: #00ffcc; text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-primary { 
            width: 100%; padding: 15px; background: linear-gradient(45deg, #8a2be2, #4a00e0); color: white; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }
        #btn-username { background: linear-gradient(45deg, #00b4db, #0083b0); box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4); }
        .history-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; width: 100%; max-width: 420px; max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .history-title { font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .history-item { font-size: 12px; padding: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ccc; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #00ffcc; color: #0f0c1b; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; opacity: 0; z-index: 99; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        /* KLIK REPO CONFIG */
        .config-field { width: 100%; padding: 12px; background: #110d24; border: 1px solid #3d3463; border-radius: 8px; color: #00ffcc; font-family: monospace; font-size: 13px; text-align: center; outline: none; }
        .btn-admin-control { margin-top: 8px; padding: 8px 12px; font-size: 12px; font-weight: bold; border-radius: 6px; border: 1px solid #3d3463; background: #1a1535; color: #d6c7ff; cursor: pointer; width: 100%; }
        
        /* STYLE KHUSUS LIST INTERAKTIF BARIS CATATAN UTAMA */
        .notes-list-container { width: 100%; min-height: 220px; max-height: 350px; overflow-y: auto; background: #141026; border: 1px solid #3d3463; border-radius: 8px; padding: 10px; text-align: left; }
        .note-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .note-num-btn { background: #3d3463; color: #00ffcc; border: 1px solid #5a4f8c; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; min-width: 35px; text-align: center; }
        .note-num-btn:hover { background: #00ffcc; color: #141026; box-shadow: 0 0 8px #00ffcc; }
        .note-text-input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 13px; padding: 4px 0; }
        .note-text-input[readonly] { cursor: default; }
    </style>
</head>
<body>

    <div class="container-card">
        <div class="title"><i class="fa-solid fa-bolt" style="color: #00ffcc;"></i> Data Generator</div>
        <input class="form-input" id="genNameOutput" placeholder="Data akan muncul di sini" readonly type="text" />
        <div class="btn-group">
            <button class="btn-primary" onclick="generateName()"><i class="fa-solid fa-shuffle"></i> Acak &amp; Salin Data</button>
            <button class="btn-primary" id="btn-username" onclick="generateUsername()"><i class="fa-solid fa-user"></i> NaPaSi</button>
        </div>
    </div>

    <div class="container-card" style="max-width: 900px; width: 100%; margin-top: 10px;">
        <div class="title"><i class="fa-solid fa-cloud-sun" style="color: #00ffcc;"></i> Catatan Sinkronisasi Multi-Device</div>
        
        <div id="adminConfigBox" style="display: none; background: rgba(255,255,255,0.02); border: 1px dashed #ff007f; padding: 15px; border-radius: 8px; margin-bottom: 20px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
            <div>
                <label style="font-size:11px; color:#aaa; display:block; text-align:left;">GITHUB USERNAME</label>
                <input type="text" id="gitUser" class="config-field" placeholder="bgszp" oninput="saveGitConfig()">
            </div>
            <div>
                <label style="font-size:11px; color:#aaa; display:block; text-align:left;">NAMA REPO WEB</label>
                <input type="text" id="gitRepo" class="config-field" placeholder="bgszp.github.io" oninput="saveGitConfig()">
            </div>
            <div>
                <label style="font-size:11px; color:#aaa; display:block; text-align:left;">GITHUB TOKEN (PAT)</label>
                <input type="password" id="gitToken" class="config-field" placeholder="github_pat_..." oninput="saveGitConfig()">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px;">
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #ff007f; margin-bottom: 5px; text-align: left;">
                    <i class="fa-solid fa-lock" id="adminLockIcon"></i> CATATAN UTAMA (LIVE)
                    <span id="syncStatus" style="font-size:10px; color:#aaa; margin-left:5px;">(Membaca...)</span>
                </div>
                
                <div id="notesContainer" class="notes-list-container">
                    </div>

                <button type="button" class="btn-admin-control" id="btnAdminAuth" onclick="toggleAdminAccess()">
                    <i class="fa-solid fa-key"></i> Unlock Admin &amp; Edit
                </button>
            </div>
            
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: left;">DATA PENTING / COPAS</div>
                <textarea id="userNotes2" placeholder="Tempel data acak..." style="width: 100%; min-height: 220px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px;" oninput="saveLocalNotes('userNotes2', 'aplikasi_notes_2')"></textarea>
                <div style="height: 31px;"></div>
            </div>
            
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: left;">LAIN-LAIN / TODO</div>
                <textarea id="userNotes3" placeholder="Info lainnya..." style="width: 100%; min-height: 220px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px;" oninput="saveLocalNotes('userNotes3', 'aplikasi_notes_3')"></textarea>
                <div style="height: 31px;"></div>
            </div>
        </div>
    </div>

    <div class="history-card" style="width: 100%; max-width: 900px; margin-top: 10px;">
        <div class="history-title"><span>RIWAYAT GENERATOR DATA</span><span style="cursor:pointer;color:#ff4a4a;" onclick="clearHistory()">Hapus</span></div>
        <div id="historyList"></div>
    </div>

    <div class="toast" id="toastNotif">Berhasil! ✨</div>

    <script>
        let DATA_DUMMY_DATABASE = [];
        const ADMIN_PIN = "1234"; 
        let isAdminAuthenticated = false;
        let currentFileSha = ""; 
        let rawNotesText = ""; // Tempat menyimpan data string gabungan mentah

        const DEFAULT_USER = "bgszp";
        const DEFAULT_REPO = "bgszp.github.io";

        document.addEventListener("DOMContentLoaded", function() {
            fetch('./data_pengguna.json').then(r => r.ok?r.json():[]).then(d => { DATA_DUMMY_DATABASE = d; });

            if(!localStorage.getItem("git_user")) document.getElementById("gitUser").value = DEFAULT_USER;
            else document.getElementById("gitUser").value = localStorage.getItem("git_user");

            if(!localStorage.getItem("git_repo")) document.getElementById("gitRepo").value = DEFAULT_REPO;
            else document.getElementById("gitRepo").value = localStorage.getItem("git_repo");

            if(localStorage.getItem("git_token")) document.getElementById("gitToken").value = localStorage.getItem("git_token");
            
            if(localStorage.getItem("aplikasi_notes_2")) document.getElementById("userNotes2").value = localStorage.getItem("aplikasi_notes_2");
            if(localStorage.getItem("aplikasi_notes_3")) document.getElementById("userNotes3").value = localStorage.getItem("aplikasi_notes_3");

            autoFetchForEveryone();
        });

        function saveGitConfig() {
            localStorage.setItem("git_user", document.getElementById("gitUser").value.trim());
            localStorage.setItem("git_repo", document.getElementById("gitRepo").value.trim());
            localStorage.setItem("git_token", document.getElementById("gitToken").value.trim());
        }

        function saveLocalNotes(id, key) { localStorage.setItem(key, document.getElementById(id).value); }

        // MENGUBAH STRING TEKS MENJADI BARISAN ELEMENT INPUT BERNOMOR
        function renderNotesList(fullText) {
            rawNotesText = fullText;
            const container = document.getElementById("notesContainer");
            container.innerHTML = "";

            // Pisahkan teks per baris baru
            let lines = fullText.split("\n");
            
            // Jika kosong sekali, beri pemicu baris awal
            if(lines.length === 0 || (lines.length === 1 && lines[0].trim() === "")) {
                lines = [""];
            }

            lines.forEach((text, index) => {
                const rowNum = index + 1;
                
                const rowDiv = document.createElement("div");
                rowDiv.className = "note-row";

                // Membuat Tombol Nomor untuk Fitur Auto Copy Klik
                const numBtn = document.createElement("button");
                numBtn.className = "note-num-btn";
                numBtn.innerText = `[${rowNum}]`;
                numBtn.title = "Klik untuk salin baris ini";
                numBtn.onclick = function() {
                    const txtToCopy = inputField.value;
                    if(txtToCopy.trim() !== "") {
                        if (navigator.clipboard && window.isSecureContext) {
                            navigator.clipboard.writeText(txtToCopy).then(() => showToast(`Salin Baris ${rowNum}: "${txtToCopy.substring(0,15)}..." ✨`));
                        }
                    }
                };

                // Area Input Teks
                const inputField = document.createElement("input");
                inputField.type = "text";
                inputField.className = "note-text-input";
                inputField.value = text;
                
                // Kondisi awal dikunci sebelum Unlock Admin
                if(!isAdminAuthenticated) {
                    inputField.setAttribute("readonly", "true");
                }

                // Handler deteksi tombol Enter saat mengedit data di baris aktif
                inputField.onkeydown = function(e) {
                    if (e.key === "Enter" && isAdminAuthenticated) {
                        e.preventDefault();
                        insertNewRowAfter(index);
                    }
                };

                rowDiv.appendChild(numBtn);
                rowDiv.appendChild(inputField);
                container.appendChild(rowDiv);
            });
        }

        // OTOMATIS BIKIN BARIS BARU SAAT TEKAN ENTER
        function insertNewRowAfter(currentIndex) {
            const inputs = document.querySelectorAll(".note-text-input");
            let newLines = [];
            inputs.forEach(inp => newLines.push(inp.value));
            
            // Sisipkan baris kosong tepat di bawah indeks aktif
            newLines.splice(currentIndex + 1, 0, "");
            
            // Gambar ulang struktur baris baru
            renderNotesList(newLines.join("\n"));
            
            // Pindahkan fokus kursor ke baris baru tersebut secara otomatis
            const updatedInputs = document.querySelectorAll(".note-text-input");
            if(updatedInputs[currentIndex + 1]) {
                updatedInputs[currentIndex + 1].focus();
            }
        }

        // KUMPULKAN KEMBALI DATA INPUT MENJADI SATU STRING MENTAH
        function packInputsToString() {
            const inputs = document.querySelectorAll(".note-text-input");
            let lineArray = [];
            inputs.forEach(inp => lineArray.push(inp.value));
            return lineArray.join("\n");
        }

        // FUNGSI BACA AMBIL DARI GITHUB AUTOMATIC
        async function autoFetchForEveryone() {
            const statusLabel = document.getElementById("syncStatus");
            statusLabel.innerText = "(Memantau Live...)";
            
            const url = `https://bgszp.github.io/catatan_utama.txt?t=${Date.now()}`;

            try {
                const res = await fetch(url);
                if(res.ok) {
                    const textData = await res.text();
                    renderNotesList(textData);
                    statusLabel.innerText = "(Mode Pantau Aktif)";
                    statusLabel.style.color = "#00ffcc";
                    fetchShaQuietly();
                } else {
                    renderNotesList("");
                    statusLabel.innerText = "(Catatan Kosong)";
                }
            } catch(e) {
                statusLabel.innerText = "(Gagal Memuat)";
                statusLabel.style.color = "#ff4a4a";
            }
        }

        async function fetchShaQuietly() {
            const token = document.getElementById("gitToken").value.trim();
            if(!token) return;
            try {
                const res = await fetch(`https://api.github.com/repos/${DEFAULT_USER}/${DEFAULT_REPO}/contents/catatan_utama.txt`, {
                    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" }
                });
                if(res.status === 200) {
                    const data = await res.json();
                    currentFileSha = data.sha;
                }
            } catch(e){}
        }

        // PROSES UNLOCK KEAMANAN PIN ADMIN & SAVE CLOUD
        async function toggleAdminAccess() {
            const btnAdmin = document.getElementById("btnAdminAuth");
            const iconLock = document.getElementById("adminLockIcon");
            const statusLabel = document.getElementById("syncStatus");
            const configBox = document.getElementById("adminConfigBox");

            if (!isAdminAuthenticated) {
                const inputPin = prompt("Masukkan PIN Keamanan Admin:");
                if (inputPin === ADMIN_PIN) {
                    isAdminAuthenticated = true;
                    
                    // Buka gembok seluruh field input baris notes
                    const inputs = document.querySelectorAll(".note-text-input");
                    inputs.forEach(inp => inp.removeAttribute("readonly"));

                    configBox.style.display = "grid"; 
                    btnAdmin.innerHTML = '<i class="fa-solid fa-cloud-upload-alt"></i> Simpan Perubahan &amp; Kunci';
                    btnAdmin.style.background = "#ff007f";
                    iconLock.className = "fa-solid fa-lock-open";
                    showToast("Mode Admin Terbuka! 🔓");
                } else if (inputPin !== null) { alert("PIN Salah! Akses ditolak."); }
            } else {
                const user = document.getElementById("gitUser").value.trim() || DEFAULT_USER;
                const repo = document.getElementById("gitRepo").value.trim() || DEFAULT_REPO;
                const token = document.getElementById("gitToken").value.trim();
                
                if(!token) {
                    alert("Gagal Menyimpan! Anda harus mengisi GITHUB TOKEN (PAT) terlebih dahulu.");
                    return;
                }

                statusLabel.innerText = "(Mengupload...)";
                btnAdmin.disabled = true;

                const url = `https://api.github.com/repos/${user}/${repo}/contents/catatan_utama.txt`;
                
                // Ambil string teks gabungan dari baris input yang telah diedit
                const combinedText = packInputsToString();
                const base64Content = btoa(unescape(encodeURIComponent(combinedText)));

                const bodyPayload = {
                    message: "Update list bernomor baris via Admin Web Perangkat",
                    content: base64Content
                };
                
                if(!currentFileSha) { await fetchShaQuietly(); }
                if(currentFileSha) bodyPayload.sha = currentFileSha;

                try {
                    const res = await fetch(url, {
                        method: "PUT",
                        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                        body: JSON.stringify(bodyPayload)
                    });

                    if(res.ok) {
                        const resData = await res.json();
                        currentFileSha = resData.content.sha;
                        isAdminAuthenticated = false;
                        
                        // Kunci kembali seluruh baris input teks
                        const inputs = document.querySelectorAll(".note-text-input");
                        inputs.forEach(inp => inp.setAttribute("readonly", "true"));

                        configBox.style.display = "none"; 
                        btnAdmin.innerHTML = '<i class="fa-solid fa-key"></i> Unlock Admin &amp; Edit';
                        btnAdmin.style.background = "#1a1535";
                        iconLock.className = "fa-solid fa-lock";
                        statusLabel.innerText = "(Mode Pantau Aktif)";
                        statusLabel.style.color = "#00ffcc";
                        showToast("Tersimpan secara Global! ☁️");
                        
                        // Muat ulang isi render list terbaru agar rapi
                        renderNotesList(combinedText);
                    } else { throw new Error(); }
                } catch(e) {
                    alert("Gagal memperbarui Cloud. Pastikan Token PAT Anda benar.");
                    statusLabel.innerText = "(Gagal Menyimpan)";
                } finally {
                    btnAdmin.disabled = false;
                }
            }
        }

        // --- GENERATOR NAMA ---
        window.generateName = function() {
            if (DATA_DUMMY_DATABASE.length === 0) return;
            const item = DATA_DUMMY_DATABASE[Math.floor(Math.random() * DATA_DUMMY_DATABASE.length)];
            const res = `${item.nama}, ${item.alamat}, ${item.no_hp}`;
            tampilkanDanSalin(res); tambahKeRiwayat(res);
        };
        window.generateUsername = function() {
            const val = document.getElementById('genNameOutput').value;
            if (!val || val === "Data akan muncul di sini") return;
            const res = val.split(',')[0].trim().replace(/\s+/g, '.').toLowerCase();
            tampilkanDanSalin(res); tambahKeRiwayat(res);
        };
        function tampilkanDanSalin(t) {
            document.getElementById('genNameOutput').value = t;
            if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(t).then(() => showToast("Berhasil Disalin! ✨")); }
        }
        function tambahKeRiwayat(t) {
            const list = document.getElementById('historyList'); const item = document.createElement('div');
            item.className = 'history-item'; item.innerText = t; item.onclick = function() { tampilkanDanSalin(t); };
            list.insertBefore(item, list.firstChild);
        }
        function clearHistory() { document.getElementById('historyList').innerHTML = ''; }
        function showToast(m) { const t = document.getElementById('toastNotif'); t.innerText = m; t.classList.add('show'); setTimeout(() => { t.classList.remove('show'); }, 2000); }
    </script>
</body>
</html>
