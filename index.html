<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Data Futuristik v2.6</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; transition: all 0.3s ease; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0c1b; background: linear-gradient(to bottom, #15102a, #0f0c1b);
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; color: #fff;
        }
        .container-card { 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; padding: 30px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); width: 100%; max-width: 420px; text-align: center; margin-bottom: 20px;
        }
        .title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #d6c7ff; letter-spacing: 0.5px; }
        .form-input { 
            width: 100%; padding: 16px; margin-bottom: 20px; text-align: center; font-weight: 600; font-size: 15px; 
            border: 2px solid #3d3463; border-radius: 12px; outline: none; background-color: #1a1535; color: #00ffcc; text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn-primary { 
            width: 100%; padding: 15px; background: linear-gradient(45deg, #8a2be2, #4a00e0); color: white; 
            border: none; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 16px; box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }
        #btn-username { background: linear-gradient(45deg, #00b4db, #0083b0); box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4); }
        .history-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 15px; width: 100%; max-width: 420px; max-height: 200px; overflow-y: auto; }
        .history-title { font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .history-item { font-size: 12px; padding: 8px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); color: #ccc; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #00ffcc; color: #0f0c1b; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; opacity: 0; z-index: 99; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .sms-info-tag { background: #1a1535; border: 1px solid #3d3463; border-radius: 8px; padding: 10px; font-size: 13px; display: flex; justify-content: space-around; margin-bottom: 15px; }
        .sms-info-tag span { color: #00ffcc; }
        .config-input-group { text-align: left; margin-bottom: 15px; }
        .config-input-group label { display: block; font-size: 11px; font-weight: bold; color: #aaa; margin-bottom: 5px; }
        .config-field { width: 100%; padding: 12px; background: #110d24; border: 1px solid #3d3463; border-radius: 8px; color: #ff007f; font-family: monospace; font-size: 13px; text-align: center; outline: none; }
        .select-field { width: 100%; padding: 12px; background: #110d24; border: 1px solid #3d3463; border-radius: 8px; color: #00ffcc; font-weight: bold; text-align-last: center; }
        #btn-sms-code { background: linear-gradient(45deg, #ff007f, #7928ca); box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4); }
        .sms-result-box { margin-top: 15px; padding: 12px 15px; background: rgba(0, 255, 204, 0.05); border-left: 4px solid #00ffcc; border-radius: 6px; text-align: left; display: none; }
        .sms-error-mode { background: rgba(255, 74, 74, 0.1) !important; border-left-color: #ff4a4a !important; }
        .admin-locked { background: #141026 !important; border-color: #2b2447 !important; color: #666 !important; cursor: not-allowed; }
        .btn-admin-control { margin-top: 8px; padding: 6px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; border: 1px solid #3d3463; background: #1a1535; color: #d6c7ff; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="container-card">
        <div class="title"><i class="fa-solid fa-bolt" style="color: #00ffcc;"></i> Data Generator</div>
        <input class="form-input" id="genNameOutput" placeholder="Data akan muncul di sini" readonly type="text" />
        <div class="btn-group">
            <button class="btn-primary" onclick="generateName()"><i class="fa-solid fa-shuffle"></i> Acak &amp; Salin Data</button>
            <button class="btn-primary" id="btn-username" onclick="generateUsername()"><i class="fa-solid fa-user"></i> NaPaSi</button>
        </div>
    </div>

    <div class="container-card">
        <div class="title"><i class="fa-solid fa-comment-sms" style="color: #ff007f;"></i> SMS Code Cloud</div>
        <div class="config-input-group">
            <label>CONFIG SMSCODE API KEY</label>
            <input type="password" id="smsApiKeyField" class="config-field" placeholder="Tempel token SMSCode..." oninput="saveCurrentApiKey()" />
        </div>
        <div class="config-input-group" style="margin-bottom: 20px;">
            <label>BATAS HARGA MAKSIMAL (USD)</label>
            <select id="smsMaxPriceField" class="select-field">
                <option value="0.30">$0.30</option>
                <option value="0.50" selected>$0.50 (Rekomendasi)</option>
                <option value="0.90">$0.90</option>
            </select>
        </div>
        <div class="sms-info-tag">
            <div>Negara: <span>Indonesia</span></div>
            <div>Layanan: <span>Shopee</span></div>
        </div>
        <button class="btn-primary" id="btn-sms-code" onclick="requestSmsNumber()">Sewa Nomor Shopee</button>
        <div id="smsLoadingText" style="display:none; font-size:12px; margin-top:10px; color:#aaa;"><i class="fa-spin fa-solid fa-circle-notch"></i> Loading...</div>
        <div id="smsResultBox" class="sms-result-box">
            <p><strong>Status:</strong> <span id="smsResStatus">-</span></p>
            <p><strong>Nomor:</strong> <span id="smsResPhone">-</span></p>
            <p><strong>ID:</strong> <span id="smsResId">-</span></p>
        </div>
    </div>

    <div class="history-card">
        <div class="history-title"><span>RIWAYAT</span><span style="cursor:pointer;color:#ff4a4a;" onclick="clearHistory()">Hapus</span></div>
        <div id="historyList"></div>
    </div>

    <div class="container-card" style="max-width: 900px; width: 100%; margin-top: 20px;">
        <div class="title"><i class="fa-solid fa-cloud-sun" style="color: #00ffcc;"></i> Catatan Sinkronisasi Multi-Device</div>
        
        <div style="background: rgba(255,255,255,0.02); border: 1px dashed #3d3463; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px;">
            <div>
                <label style="font-size:11px; color:#aaa; display:block; text-align:left;">GITHUB USERNAME</label>
                <input type="text" id="gitUser" class="config-field" style="color:#00ffcc;" placeholder="Username GitHub Anda" oninput="saveGitConfig()">
            </div>
            <div>
                <label style="font-size:11px; color:#aaa; display:block; text-align:left;">NAMA REPO WEB</label>
                <input type="text" id="gitRepo" class="config-field" style="color:#00ffcc;" placeholder="Nama Repositori" oninput="saveGitConfig()">
            </div>
            <div>
                <label style="font-size:11px; color:#aaa; display:block; text-align:left;">GITHUB TOKEN (PAT)</label>
                <input type="password" id="gitToken" class="config-field" placeholder="github_pat_..." oninput="saveGitConfig()">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px;">
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #ff007f; margin-bottom: 5px; text-align: left;">
                    <i class="fa-solid fa-lock" id="adminLockIcon"></i> CATATAN UTAMA (LIVE GITHUB)
                    <span id="syncStatus" style="font-size:10px; color:#aaa; margin-left:5px;">(Membaca...)</span>
                </div>
                <textarea id="userNotes" readonly class="admin-locked" placeholder="Memuat data dari cloud..." style="width: 100%; min-height: 220px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px; resize: vertical;"></textarea>
                <button type="button" class="btn-admin-control" id="btnAdminAuth" onclick="toggleAdminAccess()">
                    <i class="fa-solid fa-key"></i> Unlock Admin &amp; Edit
                </button>
            </div>
            
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: left;">DATA PENTING / COPAS</div>
                <textarea id="userNotes2" placeholder="Tempel data acak..." style="width: 100%; min-height: 220px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px;" oninput="saveLocalNotes('userNotes2', 'aplikasi_notes_2')"></textarea>
                <div style="height: 31px;"></div>
            </div>
            
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: left;">LAIN-LAIN / TODO</div>
                <textarea id="userNotes3" placeholder="Info lainnya..." style="width: 100%; min-height: 220px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px;" oninput="saveLocalNotes('userNotes3', 'aplikasi_notes_3')"></textarea>
                <div style="height: 31px;"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toastNotif">Berhasil! ✨</div>

    <script>
        const PROXY_BASE = "https://api.allorigins.win/raw?url=";
        const TARGET_API_V2 = "https://api.smscode.gg/v2/orders";
        let DATA_DUMMY_DATABASE = [];
        
        const ADMIN_PIN = "1234"; 
        let isAdminAuthenticated = false;
        let currentFileSha = ""; // Diperlukan GitHub API untuk update file

        document.addEventListener("DOMContentLoaded", function() {
            // Load DB nama acak
            fetch('./data_pengguna.json').then(r => r.ok?r.json():[]).then(d => { DATA_DUMMY_DATABASE = d; });

            // Load saved settings
            if(localStorage.getItem("smscode_user_api_key")) document.getElementById("smsApiKeyField").value = localStorage.getItem("smscode_user_api_key");
            if(localStorage.getItem("git_user")) document.getElementById("gitUser").value = localStorage.getItem("git_user");
            if(localStorage.getItem("git_repo")) document.getElementById("gitRepo").value = localStorage.getItem("git_repo");
            if(localStorage.getItem("git_token")) document.getElementById("gitToken").value = localStorage.getItem("git_token");
            
            if(localStorage.getItem("aplikasi_notes_2")) document.getElementById("userNotes2").value = localStorage.getItem("aplikasi_notes_2");
            if(localStorage.getItem("aplikasi_notes_3")) document.getElementById("userNotes3").value = localStorage.getItem("aplikasi_notes_3");

            // Ambil Catatan Utama secara online dari GitHub saat halaman dibuka
            fetchGitHubNote();
        });

        function saveGitConfig() {
            localStorage.setItem("git_user", document.getElementById("gitUser").value.trim());
            localStorage.setItem("git_repo", document.getElementById("gitRepo").value.trim());
            localStorage.setItem("git_token", document.getElementById("gitToken").value.trim());
        }

        function saveLocalNotes(id, key) { localStorage.setItem(key, document.getElementById(id).value); }

        // AMBIL DATA DARI GITHUB (Agar semua HP mendapatkan data yang sama saat buka web)
        async function fetchGitHubNote() {
            const user = document.getElementById("gitUser").value.trim();
            const repo = document.getElementById("gitRepo").value.trim();
            const token = document.getElementById("gitToken").value.trim();
            const statusLabel = document.getElementById("syncStatus");

            if(!user || !repo || !token) {
                statusLabel.innerText = "(Config Cloud Belum Lengkap)";
                document.getElementById("userNotes").value = "Silakan isi data config Username, Repo, dan Token GitHub di atas terlebih dahulu untuk mengaktifkan cloud.";
                return;
            }

            statusLabel.innerText = "(Sinkronisasi...)";
            const url = `https://api.github.com/repos/${user}/${repo}/contents/catatan_utama.txt`;

            try {
                const res = await fetch(url, {
                    headers: { "Authorization": `token ${token}`, "Accept": "application/vnd.github.v3+json" }
                });
                
                if(res.status === 200) {
                    const data = await res.json();
                    currentFileSha = data.sha; // Ambil tanda enkripsi ID file
                    // Dekode data teks dari sistem Base64 internal GitHub
                    document.getElementById("userNotes").value = decodeURIComponent(escape(atob(data.content)));
                    statusLabel.innerText = "(Cloud Terhubung)";
                    statusLabel.style.color = "#00ffcc";
                } else if(res.status === 404) {
                    // Jika file belum ada di repo, anggap kosong baru
                    document.getElementById("userNotes").value = "";
                    statusLabel.innerText = "(File Baru Terdeteksi)";
                }
            } catch(e) {
                statusLabel.innerText = "(Gagal Sinkronisasi)";
                statusLabel.style.color = "#ff4a4a";
            }
        }

        // KUNCI & SIMPAN DATA KE GITHUB KETIKA ADMIN SELESAI EDIT
        async function toggleAdminAccess() {
            const noteUtama = document.getElementById("userNotes");
            const btnAdmin = document.getElementById("btnAdminAuth");
            const iconLock = document.getElementById("adminLockIcon");
            const statusLabel = document.getElementById("syncStatus");

            if (!isAdminAuthenticated) {
                const inputPin = prompt("Masukkan PIN Keamanan Admin:");
                if (inputPin === ADMIN_PIN) {
                    isAdminAuthenticated = true;
                    noteUtama.removeAttribute("readonly");
                    noteUtama.classList.remove("admin-locked");
                    btnAdmin.innerHTML = '<i class="fa-solid fa-cloud-upload-alt"></i> Kunci &amp; Simpan ke Cloud';
                    btnAdmin.style.background = "#ff007f";
                    iconLock.className = "fa-solid fa-lock-open";
                    showToast("Akses Terbuka! 🔓");
                } else if (inputPin !== null) { alert("PIN Salah!"); }
            } else {
                // Proses Mengunci Kembali Sekaligus Upload Otomatis ke Repo GitHub
                const user = document.getElementById("gitUser").value.trim();
                const repo = document.getElementById("gitRepo").value.trim();
                const token = document.getElementById("gitToken").value.trim();
                
                if(!user || !repo || !token) {
                    alert("Gagal Menyimpan! Konfigurasi Cloud GitHub Anda tidak valid atau kosong.");
                    return;
                }

                statusLabel.innerText = "(Menyimpan ke Cloud...)";
                btnAdmin.disabled = true;

                const url = `https://api.github.com/repos/${user}/${repo}/contents/catatan_utama.txt`;
                const contentText = noteUtama.value;
                // Encode teks ke format Base64 standard GitHub API
                const base64Content = btoa(unescape(encodeURIComponent(contentText)));

                const bodyPayload = {
                    message: "Update catatan utama via Web Generator",
                    content: base64Content
                };
                if(currentFileSha) bodyPayload.sha = currentFileSha; // Wajib dikirim jika file sudah ada sebelumnya

                try {
                    const res = await fetch(url, {
                        method: "PUT",
                        headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                        body: JSON.stringify(bodyPayload)
                    });

                    if(res.ok) {
                        const resData = await res.json();
                        currentFileSha = resData.content.sha; // Perbarui ID SHA terbaru
                        isAdminAuthenticated = false;
                        noteUtama.setAttribute("readonly", "true");
                        noteUtama.classList.add("admin-locked");
                        btnAdmin.innerHTML = '<i class="fa-solid fa-key"></i> Unlock Admin &amp; Edit';
                        btnAdmin.style.background = "#1a1535";
                        iconLock.className = "fa-solid fa-lock";
                        statusLabel.innerText = "(Cloud Terhubung)";
                        statusLabel.style.color = "#00ffcc";
                        showToast("Tersimpan di Semua HP! ☁️🔒");
                    } else { throw new Error(); }
                } catch(e) {
                    alert("Gagal mengupload ke GitHub. Cek kembali kevalidan token PAT atau nama repo Anda.");
                    statusLabel.innerText = "(Gagal Menyimpan)";
                } finally {
                    btnAdmin.disabled = false;
                }
            }
        }

        // --- SISTEM SEWA NOMOR SMSCODE ---
        function saveCurrentApiKey() { localStorage.setItem("smscode_user_api_key", document.getElementById("smsApiKeyField").value.trim()); }
        async function requestSmsNumber() {
            const btnSms = document.getElementById('btn-sms-code');
            const loadingText = document.getElementById('smsLoadingText');
            const resultBox = document.getElementById('smsResultBox');
            const resStatus = document.getElementById('smsResStatus');
            const resPhone = document.getElementById('smsResPhone');
            const resId = document.getElementById('smsResId');
            const activeApiKey = document.getElementById("smsApiKeyField").value.trim().replace(/[^\x20-\x7E]/g, "");
            const selectedMaxPrice = document.getElementById("smsMaxPriceField").value;

            btnSms.disabled = true; loadingText.style.display = "block"; resultBox.style.display = "none"; resultBox.classList.remove('sms-error-mode');

            if (!activeApiKey) {
                setTimeout(() => {
                    loadingText.style.display = "none"; btnSms.disabled = false; resultBox.classList.add('sms-error-mode');
                    resStatus.innerText = "API Key Kosong"; resPhone.innerText = "Gagal Memproses"; resultBox.style.display = "block";
                }, 300); return;
            }

            try {
                const fullUrl = PROXY_BASE + encodeURIComponent(TARGET_API_V2);
                const response = await fetch(fullUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + activeApiKey, 'idempotency-key': "key-" + Date.now() },
                    body: JSON.stringify({ catalog_product_id: 1, max_price: selectedMaxPrice, quantity: 1 })
                });
                const data = await response.json();
                if (response.ok && data.orders && data.orders.length > 0) {
                    const orderData = data.orders[0];
                    resStatus.innerText = "Sukses"; resStatus.style.color = "#00ffcc";
                    resPhone.innerText = orderData.phoneNumber || "Sukses"; resId.innerText = orderData.id || "-";
                    if(orderData.phoneNumber) { tampilkanDanSalin(orderData.phoneNumber); tambahKeRiwayat(`Sewa Shopee: ${orderData.phoneNumber}`); }
                } else { throw new Error(data.error ? data.error.message : "Gagal"); }
            } catch (error) {
                resultBox.classList.add('sms-error-mode'); resStatus.innerText = "Gagal"; resPhone.innerText = "Error Validasi"; resId.innerText = error.message;
            } finally { loadingText.style.display = "none"; btnSms.disabled = false; resultBox.style.display = "block"; }
        }

        // --- GENERATOR NAMA ---
        window.generateName = function() {
            if (DATA_DUMMY_DATABASE.length === 0) return;
            const item = DATA_DUMMY_DATABASE[Math.floor(Math.random() * DATA_DUMMY_DATABASE.length)];
            const res = `${item.nama}, ${item.alamat}, ${item.no_hp}`;
            tampilkanDanSalin(res); tambahKeRiwayat(res);
        };
        window.generateUsername = function() {
            const val = document.getElementById('genNameOutput').value;
            if (!val || val === "Data akan muncul di sini") return;
            const res = val.split(',')[0].trim().replace(/\s+/g, '.').toLowerCase();
            tampilkanDanSalin(res); tambahKeRiwayat(res);
        };
        function tampilkanDanSalin(t) {
            document.getElementById('genNameOutput').value = t;
            if (navigator.clipboard && window.isSecureContext) { navigator.clipboard.writeText(t).then(() => showToast("Berhasil Disalin! ✨")); }
        }
        function tambahKeRiwayat(t) {
            const list = document.getElementById('historyList'); const item = document.createElement('div');
            item.className = 'history-item'; item.innerText = t; item.onclick = function() { tampilkanDanSalin(t); };
            list.insertBefore(item, list.firstChild);
        }
        function clearHistory() { document.getElementById('historyList').innerHTML = ''; }
        function showToast(m) { const t = document.getElementById('toastNotif'); t.innerText = m; t.classList.add('show'); setTimeout(() => { t.classList.remove('show'); }, 2000); }
    </script>
</body>
</html>
