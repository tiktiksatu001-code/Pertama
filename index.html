<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Data Futuristik v2</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0c1b; 
            background: linear-gradient(to bottom, #15102a, #0f0c1b);
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); 
            width: 100%;
            max-width: 420px;
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #d6c7ff;
            letter-spacing: 0.5px;
        }
        .form-input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            text-align: center; 
            font-weight: 600; 
            font-size: 15px; 
            border: 2px solid #3d3463; 
            border-radius: 12px; 
            outline: none;
            background-color: #1a1535;
            color: #00ffcc;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }
        .form-input:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-primary { 
            width: 100%;
            padding: 15px; 
            background: linear-gradient(45deg, #8a2be2, #4a00e0); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }
        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(138, 43, 226, 0.2);
        }
        #btn-username {
            background: linear-gradient(45deg, #00b4db, #0083b0);
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
        }
        
        .history-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 420px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }
        .history-title {
            font-size: 13px;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .history-item {
            font-size: 12px;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #00ffcc;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #00ffcc;
            color: #0f0c1b;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            opacity: 0;
            pointer-events: none;
            z-index: 99;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* SMS STYLES */
        .sms-info-tag {
            background: #1a1535;
            border: 1px solid #3d3463;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            color: #d6c7ff;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .sms-info-tag span {
            color: #00ffcc;
        }
        #btn-sms-code {
            background: linear-gradient(45deg, #ff007f, #7928ca);
            box-shadow: 0 4px 15px rgba(255, 0, 127, 0.4);
        }
        .sms-loading {
            font-size: 13px;
            color: #aaa;
            font-style: italic;
            margin-top: 12px;
            display: none;
        }
        .sms-result-box {
            margin-top: 15px;
            padding: 12px 15px;
            background: rgba(0, 255, 204, 0.05);
            border-left: 4px solid #00ffcc;
            border-radius: 6px;
            text-align: left;
            display: none;
        }
        .sms-result-box p {
            margin: 6px 0;
            font-size: 13px;
            color: #e2d9ff;
        }
        .sms-error-mode {
            background: rgba(255, 74, 74, 0.1) !important;
            border-left-color: #ff4a4a !important;
        }
    </style>
</head>
<body>

    <!-- CARD UTAMA -->
    <div class="container-card">
        <div class="title"><i class="fa-solid fa-bolt" style="color: #00ffcc;"></i> Data Generator Futuristik</div>
        <input class="form-input" id="genNameOutput" placeholder="Data akan muncul di sini" readonly type="text" />
        <div class="btn-group">
            <button class="btn-primary" id="btn-gen" onclick="generateName()">
                <i class="fa-solid fa-shuffle"></i> Acak &amp; Salin Data
            </button>
            <button class="btn-primary" id="btn-username" onclick="generateUsername()">
                <i class="fa-solid fa-user"></i> NaPaSi
            </button>
        </div>
    </div>

    <!-- SMS CODE CARD -->
    <div class="container-card">
        <div class="title"><i class="fa-solid fa-comment-sms" style="color: #ff007f;"></i> Acaka Data - SMS Code</div>
        
        <div class="sms-info-tag">
            <div><i class="fa-solid fa-globe"></i> Negara: <span>Indonesia</span></div>
            <div><i class="fa-solid fa-bag-shopping"></i> Layanan: <span>Shopee</span></div>
        </div>

        <button class="btn-primary" id="btn-sms-code" onclick="requestSmsNumber()">
            <i class="fa-solid fa-key"></i> Sewa Nomor Shopee Indonesia
        </button>

        <div id="smsLoadingText" class="sms-loading">
            <i class="fa-solid fa-circle-notch fa-spin"></i> Menghubungkan ke API SMSCode...
        </div>

        <div id="smsResultBox" class="sms-result-box">
            <p><strong>Status:</strong> <span id="smsResStatus" style="font-weight: bold;">-</span></p>
            <p><strong>Nomor Telepon:</strong> <span id="smsResPhone" style="font-size: 16px; font-weight: bold;">-</span></p>
            <p><strong>Pesan / ID:</strong> <span id="smsResId" style="font-family: monospace; color: #aaa;">-</span></p>
        </div>
    </div>

    <!-- RIWAYAT -->
    <div class="history-card">
        <div class="history-title">
            <span><i class="fa-solid fa-history"></i> RIWAYAT GENERATE (KLIK UNTUK SALIN)</span>
            <span style="cursor:pointer; color:#ff4a4a;" onclick="clearHistory()">Hapus</span>
        </div>
        <div id="historyList"></div>
    </div>

    <div class="toast" id="toastNotif">Berhasil Disalin! ✨</div>

    <!-- NOTES -->
    <div class="container-card" style="max-width: 900px; width: 100%; margin-top: 20px;">
        <div class="title" style="text-align: center;"><i class="fa-solid fa-pen-to-square" style="color: #00ffcc;"></i> Notes / Catatan 3 Kolom</div>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; margin-bottom: 20px;">
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: left;">CATATAN UTAMA</div>
                <textarea id="userNotes" placeholder="Tulis catatan utama di sini..." style="width: 100%; min-height: 250px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px; resize: vertical;" oninput="saveNotes('userNotes', 'aplikasi_notes')"></textarea>
            </div>
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: left;">DATA PENTING / COPAS</div>
                <textarea id="userNotes2" placeholder="Tempel data hasil acak ke sini..." style="width: 100%; min-height: 250px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px; resize: vertical;" oninput="saveNotes('userNotes2', 'aplikasi_notes_2')"></textarea>
            </div>
            <div>
                <div style="font-size: 13px; font-weight: bold; color: #aaa; margin-bottom: 5px; text-align: left;">LAIN-LAIN / TODO</div>
                <textarea id="userNotes3" placeholder="Tulis tambahan info lainnya di sini..." style="width: 100%; min-height: 250px; padding: 12px; background: #1a1535; color: #fff; border: 1px solid #3d3463; border-radius: 8px; resize: vertical;" oninput="saveNotes('userNotes3', 'aplikasi_notes_3')"></textarea>
            </div>
        </div>
        <button class="btn-primary" onclick="clearAllNotes()" style="background: linear-gradient(45deg, #ff4a4a, #cc2e2e); max-width: 200px; margin: 0 auto;">
            <i class="fa-solid fa-trash"></i> Hapus Semua Catatan
        </button>
    </div>

    <script>
        // ========================================================
        // PENTING: GANTI TEKS DI BAWAH INI DENGAN API KEY ANDA
        // ========================================================
        const SMSCODE_API_KEY = "MASUKKAN_API_KEY_SMSCODE_ANDA_DI_SINI";
        const API_BASE_URL = "https://api.smscode.gg/v1"; 

        let DATA_DUMMY_DATABASE = [];

        document.addEventListener("DOMContentLoaded", function() {
            fetch('./data_pengguna.json')
                .then(response => response.ok ? response.json() : [])
                .then(data => { DATA_DUMMY_DATABASE = data; })
                .catch(err => console.error("Error JSON:", err));

            if(localStorage.getItem("aplikasi_notes")) document.getElementById("userNotes").value = localStorage.getItem("aplikasi_notes");
            if(localStorage.getItem("aplikasi_notes_2")) document.getElementById("userNotes2").value = localStorage.getItem("aplikasi_notes_2");
            if(localStorage.getItem("aplikasi_notes_3")) document.getElementById("userNotes3").value = localStorage.getItem("aplikasi_notes_3");
        });

        async function requestSmsNumber() {
            const btnSms = document.getElementById('btn-sms-code');
            const loadingText = document.getElementById('smsLoadingText');
            const resultBox = document.getElementById('smsResultBox');
            const resStatus = document.getElementById('smsResStatus');
            const resPhone = document.getElementById('smsResPhone');
            const resId = document.getElementById('smsResId');

            // 1. Tampilkan animasi loading & reset tampilan box
            btnSms.disabled = true;
            loadingText.style.display = "block";
            resultBox.style.display = "none";
            resultBox.classList.remove('sms-error-mode');

            // 2. Proteksi Validasi API Key langsung di UI (Supaya tidak diam saja)
            if (!SMSCODE_API_KEY || SMSCODE_API_KEY.includes("MASUKKAN_API_KEY")) {
                setTimeout(() => {
                    loadingText.style.display = "none";
                    btnSms.disabled = false;
                    resultBox.classList.add('sms-error-mode');
                    resStatus.innerText = "Konfigurasi Salah";
                    resStatus.style.color = "#ff4a4a";
                    resPhone.innerText = "API Key Kosong";
                    resId.innerText = "Silakan buka kode HTML Anda, cari konstanta SMSCODE_API_KEY di bagian bawah script, lalu tempel token API Key resmi Anda dari dashboard SMSCode.gg.";
                    resultBox.style.display = "block";
                }, 400);
                return;
            }

            // 3. Proses Request API
            try {
                const response = await fetch(`${API_BASE_URL}/orders`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SMSCODE_API_KEY}`
                    },
                    body: JSON.stringify({
                        country: "ID",
                        service: "shopee"
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    resStatus.innerText = "Sukses";
                    resStatus.style.color = "#00ffcc";
                    resPhone.innerText = data.phoneNumber || "Nomor Kosong";
                    resId.innerText = data.id || "-";
                    
                    if(data.phoneNumber) {
                        tampilkanDanSalin(data.phoneNumber);
                        tambahKeRiwayat(`Sewa Shopee: ${data.phoneNumber}`);
                    }
                } else {
                    throw new Error(data.message || `Server merespon status ${response.status}`);
                }

            } catch (error) {
                // Jika diblokir oleh CORS atau internet putus, bagian ini pasti berjalan
                resultBox.classList.add('sms-error-mode');
                resStatus.innerText = "Gagal Mengubungi API";
                resStatus.style.color = "#ff4a4a";
                resPhone.innerText = "Koneksi Terblokir / Gagal";
                resId.innerText = error.message + " (Periksa apakah API Key aktif, atau kemungkinan kendala kebijakan CORS browser saat file dibuka lokal)";
            } finally {
                loadingText.style.display = "none";
                btnSms.disabled = false;
                resultBox.style.display = "block";
            }
        }

        window.generateName = function() {
            if (DATA_DUMMY_DATABASE.length === 0) { return; }
            const dataAcak = DATA_DUMMY_DATABASE[Math.floor(Math.random() * DATA_DUMMY_DATABASE.length)];
            const dataFinal = `${dataAcak.nama}, ${dataAcak.alamat}, ${dataAcak.no_hp}`;
            tampilkanDanSalin(dataFinal);
            tambahKeRiwayat(dataFinal);
        };

        window.generateUsername = function() {
            const teksInput = document.getElementById('genNameOutput').value;
            if (!teksInput || teksInput === "Data akan muncul di sini") { return; }
            const namaLengkap = teksInput.split(',')[0].trim();
            const namaDenganTitik = namaLengkap.replace(/\s+/g, '.').toLowerCase();
            tampilkanDanSalin(namaDenganTitik);
            tambahKeRiwayat(namaDenganTitik);
        };

        function tampilkanDanSalin(teks) {
            const outputField = document.getElementById('genNameOutput');
            if (outputField) {
                outputField.value = teks;
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(teks).then(() => showToast("Berhasil Disalin! ✨")).catch(() => salinManual(outputField));
                } else {
                    salinManual(outputField);
                }
            }
        }

        function salinManual(inputElement) {
            inputElement.select();
            document.execCommand("copy");
            showToast("Berhasil Disalin! ✨");
        }

        function tambahKeRiwayat(teks) {
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = teks;
            item.onclick = function() { tampilkanDanSalin(teks); };
            historyList.insertBefore(item, historyList.firstChild);
        }

        function clearHistory() { document.getElementById('historyList').innerHTML = ''; }
        function showToast(pesan) {
            const toast = document.getElementById('toastNotif');
            toast.innerText = pesan;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }
        window.saveNotes = function(elementId, storageKey) { localStorage.setItem(storageKey, document.getElementById(elementId).value); };
        window.clearAllNotes = function() {
            if (confirm("Hapus semua catatan?")) {
                document.getElementById("userNotes").value = ""; document.getElementById("userNotes2").value = ""; document.getElementById("userNotes3").value = "";
                localStorage.clear();
            }
        };
    </script>
</body>
</html>
