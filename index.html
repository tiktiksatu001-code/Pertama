<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Data Futuristik v2</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0c1b; 
            background: linear-gradient(to bottom, #15102a, #0f0c1b);
            margin: 0; 
            padding: 20px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container-card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); 
            width: 100%;
            max-width: 420px;
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #d6c7ff;
            letter-spacing: 0.5px;
        }
        .form-input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            text-align: center; 
            font-weight: 600; 
            font-size: 15px; 
            border: 2px solid #3d3463; 
            border-radius: 12px; 
            outline: none;
            background-color: #1a1535;
            color: #00ffcc;
            text-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }
        .form-input:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 10px rgba(138, 43, 226, 0.5);
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn-primary { 
            width: 100%;
            padding: 15px; 
            background: linear-gradient(45deg, #8a2be2, #4a00e0); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 10px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.4);
        }
        .btn-primary:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(138, 43, 226, 0.2);
        }
        #btn-username {
            background: linear-gradient(45deg, #00b4db, #0083b0);
            box-shadow: 0 4px 15px rgba(0, 180, 219, 0.4);
        }
        
        .history-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 420px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
        }
        .history-title {
            font-size: 13px;
            font-weight: bold;
            color: #aaa;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }
        .history-item {
            font-size: 12px;
            padding: 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #00ffcc;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #00ffcc;
            color: #0f0c1b;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
            opacity: 0;
            pointer-events: none;
            z-index: 99;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container-card">
        <div class="title"><i class="fa-solid fa-bolt" style="color: #00ffcc;"></i> Data Generator Futuristik</div>
        
        <input class="form-input" id="genNameOutput" placeholder="Data akan muncul di sini" readonly type="text" />
        
        <div class="btn-group">
            <button class="btn-primary" id="btn-gen" onclick="generateName()">
                <i class="fa-solid fa-shuffle"></i> Acak &amp; Salin Data
            </button>
            
            <button class="btn-primary" id="btn-username" onclick="generateUsername()">
                <i class="fa-solid fa-user"></i> NaPaSi
            </button>
        </div>
    </div>

    <div class="history-card">
        <div class="history-title">
            <span><i class="fa-solid fa-history"></i> RIWAYAT GENERATE (KLIK UNTUK SALIN)</span>
            <span style="cursor:pointer; color:#ff4a4a;" onclick="clearHistory()">Hapus</span>
        </div>
        <div id="historyList"></div>
    </div>

    <div class="toast" id="toastNotif">Berhasil Disalin! ✨</div>

    <script>
        // Array Data Utama yang di-load dari file JSON eksternal
        let DATA_DUMMY_DATABASE = [];

        // Fungsi bawaan untuk mengambil data dari file data_pengguna.json
        document.addEventListener("DOMContentLoaded", function() {
            fetch('./data_pengguna.json')
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Gagal mengambil file JSON.");
                    }
                    return response.json();
                })
                .then(data => {
                    DATA_DUMMY_DATABASE = data;
                    console.log("Database dummy berhasil dimuat! Total: " + data.length + " baris data.");
                })
                .catch(err => {
                    console.error("Error load data:", err);
                    showToast("Gagal memuat database JSON! ⚠️");
                });
        });

        window.generateName = function() {
            // Validasi jika data belum selesai di-load oleh browser
            if (DATA_DUMMY_DATABASE.length === 0) {
                showToast("Data sedang memuat, silakan tunggu... ⚠️");
                return;
            }

            // Memilih satu objek baris data secara acak dari database JSON
            const dataAcak = DATA_DUMMY_DATABASE[Math.floor(Math.random() * DATA_DUMMY_DATABASE.length)];
            
            // Menggabungkan string data sesuai dengan template Anda sebelumnya
            const dataFinal = `${dataAcak.nama} | ${dataAcak.alamat} | ${dataAcak.no_hp}`;
            
            tampilkanDanSalin(dataFinal);
            tambahKeRiwayat(dataFinal);
        };

        window.generateUsername = function() {
            const teksInput = document.getElementById('genNameOutput').value;
            
            if (!teksInput || teksInput === "Data akan muncul di sini") {
                showToast("Silakan acak data terlebih dahulu! ⚠️");
                return;
            }
            
            const namaLengkap = teksInput.split('|')[0].trim();
            const namaTanpasPasi = namaLengkap.replace(/\s+/g, '').toLowerCase();
            
            tampilkanDanSalin(namaTanpasPasi);
            tambahKeRiwayat(namaTanpasPasi);
        };

        function tampilkanDanSalin(teks) {
            const outputField = document.getElementById('genNameOutput');
            if (outputField) {
                outputField.value = teks;
                
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(teks).then(() => {
                        showToast("Berhasil Disalin! OK!! ✨");
                    }).catch(err => {
                        salinManual(outputField);
                    });
                } else {
                    salinManual(outputField);
                }
            }
        }

        function salinManual(inputElement) {
            inputElement.select();
            inputElement.setSelectionRange(0, 99999);
            document.execCommand("copy");
            showToast("Berhasil Disalin! OK!! ✨");
        }

        function tambahKeRiwayat(teks) {
            const historyList = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerText = teks;
            item.onclick = function() { tampilkanDanSalin(teks); };
            historyList.insertBefore(item, historyList.firstChild);
        }

        function clearHistory() {
            document.getElementById('historyList').innerHTML = '';
            showToast("Riwayat dihapus!");
        }

        function showToast(pesan) {
            const toast = document.getElementById('toastNotif');
            toast.innerText = pesan;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }
    </script>
</body>
</html>
