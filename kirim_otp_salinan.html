<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Otomatis OTP - Shopee Only</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0c16;
            --bg-card: #121324;
            --bg-item: #181933;
            --border-color: #2c2e5c;
            --accent-cyan: #00ffcc;
            --accent-purple: #6c5ce7;
            --accent-red: #ff5555;
            --accent-green: #50fa7b;
            --text-main: #f8f8f2;
            --text-sub: #8b8da9;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 500px;
            background: var(--bg-card); border-radius: 18px;
            border: 1px solid var(--border-color); padding: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 20px;
        }

        .badge-promo { background: #3c1e70; color: #b4b7ff; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; }
        
        .pemicu-dropdown {
            background: var(--bg-item); border: 1px solid #32356b; border-radius: 12px;
            padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-weight: bold; font-size: 14px; color: #fff; user-select: none;
        }
        .pemicu-dropdown:hover { background: #1e2042; }
        
        .wrapper-layanan {
            background: var(--bg-item); border: 1px solid #32356b; border-top: none;
            border-radius: 0 0 12px 12px; overflow: hidden; margin-top: -1px;
            display: none; position: relative; z-index: 10;
        }
        .search-box-container {
            padding: 10px; background: #15102a; border-bottom: 1px solid #2c2e5c;
            position: sticky; top: 0; z-index: 11;
        }
        .search-input {
            width: 100%; padding: 10px; border-radius: 8px; background: #0b0c16;
            border: 1px solid #3d3463; color: #fff; font-size: 13px; outline: none;
        }
        .search-input:focus { border-color: var(--accent-cyan); }
        .scrollable-list { max-height: 250px; overflow-y: auto; }
        
        .opsi-shopee {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #222448;
        }
        .opsi-shopee:last-child { border-bottom: none; }
        .opsi-shopee:hover { background: #20224a; }
        .opsi-shopee.terpilih { background: #2a2c63; border-left: 4px solid var(--accent-purple); }
        
        .btn-pesan-premium {
            width: 100%; padding: 14px; background: #5f27cd; color: white; border: none;
            border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer;
            text-transform: uppercase; margin-top: 15px; box-shadow: 0 4px 12px rgba(95, 39, 205, 0.4);
        }
        .btn-pesan-premium:hover:not(:disabled) { background: var(--accent-purple); }
        .btn-pesan-premium:disabled { background: #44475a !important; color: #888 !important; cursor: not-allowed !important; box-shadow: none !important; }
        
        .card-order { background: #1a1b35; border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-top: 15px; }
        .btn-batal {
            background: var(--accent-red); color: white; border: none; padding: 10px 12px;
            border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 12px; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .btn-batal:hover:not(:disabled) { background: #ff3333; }
        .btn-batal:disabled { background: #2f3148; color: #727598; cursor: not-allowed; border: 1px solid #3d3f5e; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #00ffcc; color: #0f0c1b; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; opacity: 0; z-index: 99; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <!-- KOTAK UTAMA: KHUSUS PANEL MULTI-OTP (SERVER 1) -->
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <h3 style="color: #fff; margin: 0; font-size: 17px; font-weight: 600;">📱 Server 1 (Shopee Only Panel)</h3>
                <span class="badge-promo">Live Dynamic</span>
            </div>
            
            <div style="background: var(--bg-item); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; color: var(--accent-green);">
                👛 <span id="txtSaldoLive">Rp 0</span>
                <span onclick="refreshSemuaDataLive()" style="cursor: pointer; font-size: 12px; color: var(--accent-cyan); margin-left: 5px;" title="Refresh Data">🔄</span>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <div class="pemicu-dropdown" onclick="toggleApiKeyDropdown()" style="padding: 12px 16px; border-radius: 10px; font-size: 13px; color: var(--accent-cyan);">
                <span>🔑 Konfigurasi API Key</span>
                <span id="panahApiKey" style="transition: transform 0.2s; font-size: 11px;">▼</span>
            </div>

            <div id="wadahApiKeyDropdown" style="display: none; background: var(--bg-item); padding: 12px; border-radius: 0 0 10px 10px; border: 1px solid #222448; border-top: none; margin-top: -2px;">
                <label style="font-size: 11px; color: var(--accent-cyan); font-weight: bold;">🔑 Kode API Key Anda:</label>
                <div style="display: flex; margin-top: 5px; gap: 8px;">
                    <input type="password" id="otpKeyV5" placeholder="Masukkan token API Key" class="search-input">
                    <button onclick="simpanKeyV5()" style="padding: 10px 12px; background: var(--accent-cyan); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px;">Simpan</button>
                </div>
                <small id="statusKeyV5" style="color: var(--accent-red); font-size: 11px; display: block; margin-top: 6px;">⚠️ API Key belum aktif.</small>
            </div>
        </div>

        <div>
            <label style="font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 5px;">Pilih Layanan</label>
            
            <div class="pemicu-dropdown" id="btnTriggerDropdown" onclick="toggleMekanismeDropdown()">
                <span id="txtLayananTerpilihHeader">Menghubungkan server...</span>
                <span id="ikonPanahDropdown" style="transition: transform 0.2s; font-size: 12px;">▼</span>
            </div>

            <div class="wrapper-layanan" id="boxLayananShopee">
                <div class="search-box-container">
                    <input type="text" id="cariLayanan" class="search-input" placeholder="Cari layanan (contoh: Shope)" value="Shope" onkeyup="renderDaftarLayanan()">
                </div>
                <div id="listLayananRender" class="scrollable-list">
                    <div style="text-align: center; padding: 20px; color: #6272a4; font-style: italic; font-size: 13px;">Memuat data live server...</div>
                </div>
            </div>
            
            <button onclick="prosesPesanSekarang()" class="btn-pesan-premium" id="btnPesanUtama">
                <i class="fa-solid fa-cart-shopping" style="margin-right:5px;"></i> Pesan Sekarang
            </button>
        </div>

        <div style="margin-top: 25px; border-top: 2px dashed var(--border-color); padding-top: 15px;">
            <div style="font-size: 14px; font-weight: bold; color: var(--accent-green); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span>📱 Nomor & OTP Aktif:</span>
                <span onclick="hapusRiwayatSelesai()" style="cursor: pointer; font-size: 11px; color: var(--accent-red); background: var(--bg-item); padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border-color); font-weight: normal;">🧹 Bersihkan</span>
            </div>
            <div id="containerListOrder">
                <div id="panelKosong" style="text-align: center; padding: 30px 10px; color: #6272a4; font-style: italic; font-size: 13px;">Belum ada pesanan aktif. Klik pesan di atas.</div>
            </div>
        </div>

        <div id="miniConsoleLog" style="margin-top: 15px; padding: 8px; background: var(--bg-main); border-radius: 6px; font-family: monospace; font-size: 11px; color: var(--accent-green); border: 1px solid var(--border-color); word-break: break-all; max-height: 80px; overflow-y: auto;">
            └> System Ready.
        </div>
    </div>
    
    <div class="toast" id="toastNotif">Berhasil! ✨</div>

    <script>
        let daftarOrderan = []; 
        let saldoSekarangGlobal = 0;
        let globalListLayanan = []; 
        let idLayananTerpilih = null;
        let namaLayananTerpilih = "";
        let hargaLayananTerpilih = 0;

        async function fetchSmartProxy(targetUrl, isPost = false, postBody = null) {
            const isStateChanging = targetUrl.includes("order.php") || targetUrl.includes("cancel.php");
            const proxies = isStateChanging ? [
                "https://corsproxy.io/?",
                "https://api.codetabs.com/v1/proxy?quest="
            ] : [
                "", 
                "https://corsproxy.io/?",
                "https://api.codetabs.com/v1/proxy?quest="
            ];

            let options = { method: isPost ? "POST" : "GET" };
            if (isPost && postBody) {
                options.headers = { "Content-Type": "application/x-www-form-urlencoded" };
                options.body = new URLSearchParams(postBody).toString();
            }

            for (let proxy of proxies) {
                try {
                    let url = targetUrl;
                    if (proxy !== "") {
                        url = proxy.includes("corsproxy.io") ? proxy + targetUrl : proxy + encodeURIComponent(targetUrl);
                    }
                    const res = await fetch(url, options);
                    if (res.ok) {
                        const data = await res.json();
                        return data;
                    }
                } catch (e) {
                    console.log("Jalur gagal:", proxy || "Direct", e.message);
                }
            }
            throw new Error("Semua jalur koneksi merespon gagal/timeout.");
        }

        document.addEventListener("DOMContentLoaded", function() {
            const savedKey = localStorage.getItem("otp_key_reseller");
            if(savedKey) {
                document.getElementById("otpKeyV5").value = savedKey;
                document.getElementById("statusKeyV5").innerText = "✅ API Key Terkunci & Aktif.";
                document.getElementById("statusKeyV5").style.color = "#50fa7b";
                refreshSemuaDataLive();
            } else {
                toggleApiKeyDropdown();
            }

            const orderanLokal = localStorage.getItem("daftar_orderan_live");
            if (orderanLokal) { daftarOrderan = JSON.parse(orderanLokal); renderUILayout(); }

            setInterval(mesinWaktuTerpusat, 1000);
            setInterval(mesinCekSmsTerpusat, 4000);
            setInterval(ambilLayananLive, 8000); 
        });

        function toggleApiKeyDropdown() {
            const w = document.getElementById("wadahApiKeyDropdown");
            const p = document.getElementById("panahApiKey");
            if (w.style.display === "none" || w.style.display === "") {
                w.style.display = "block"; p.style.transform = "rotate(180deg)";
            } else { w.style.display = "none"; p.style.transform = "rotate(0deg)"; }
        }

        function simpanKeyV5() {
            const key = document.getElementById("otpKeyV5").value.trim();
            if(!key) { alert("Masukkan API Key!"); return; }
            localStorage.setItem("otp_key_reseller", key);
            document.getElementById("statusKeyV5").innerText = "✅ API Key Disimpan!";
            document.getElementById("statusKeyV5").style.color = "#50fa7b";
            refreshSemuaDataLive(); toggleApiKeyDropdown();
        }

        function toggleMekanismeDropdown() {
            const box = document.getElementById("boxLayananShopee");
            const panah = document.getElementById("ikonPanahDropdown");
            const tombol = document.getElementById("btnTriggerDropdown");
            if (box.style.display === "none" || box.style.display === "") {
                box.style.display = "block"; panah.style.transform = "rotate(180deg)"; tombol.style.borderRadius = "12px 12px 0 0";
            } else {
                box.style.display = "none"; panah.style.transform = "rotate(0deg)"; tombol.style.borderRadius = "12px";
            }
        }

        function refreshSemuaDataLive() { ambilSaldoLive(); ambilLayananLive(); }

        async function ambilSaldoLive() {
            const key = localStorage.getItem("otp_key_reseller"); if (!key) return;
            try {
                const d = await fetchSmartProxy(`https://otpinstan.com/api/reseller/balance.php?api_key=${key}&t=${Date.now()}`);
                saldoSekarangGlobal = parseInt(d.balance || d.saldo || d.balance_reseller || 0);
                document.getElementById("txtSaldoLive").innerText = "Rp " + saldoSekarangGlobal.toLocaleString("id-ID");
            } catch(e) {}
        }

        async function ambilLayananLive() {
            const key = localStorage.getItem("otp_key_reseller"); if (!key) return;
            try {
                const data = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/services.php?country_id=7&api_key=${key}&t=${Date.now()}`);
                let listArray = Array.isArray(data) ? data : (data.services || data.data || data.result || []);
                globalListLayanan = listArray; 
                renderDaftarLayanan();
            } catch (e) {
                printLog("Koneksi gagal/timeout. Re-trying...");
            }
        }

        function renderDaftarLayanan() {
            const container = document.getElementById("listLayananRender");
            const keyword = document.getElementById("cariLayanan").value.toLowerCase();
            
            let filtered = globalListLayanan.filter(item => {
                let nama = String(item.name || item.service_name || item.title || item.layanan || "").toLowerCase();
                return nama.includes(keyword);
            });

            if (filtered.length > 0) {
                let html = "";
                filtered.forEach((item, index) => {
                    let id = String(item.product_id || item.id || item.service_id || "");
                    let name = item.name || item.service_name || item.title || item.layanan || "Layanan";
                    let price = parseInt(item.price || item.cost || item.harga || item.rate || 0);
                    let stock = parseInt(item.stock ?? item.stok ?? item.available ?? item.qty ?? 0);

                    let isSelected = (idLayananTerpilih === id);
                    if (!idLayananTerpilih && index === 0) {
                        idLayananTerpilih = id; namaLayananTerpilih = name; hargaLayananTerpilih = price; isSelected = true;
                    }

                    if (isSelected) {
                        hargaLayananTerpilih = price;
                        updateTeksHeaderTerpilih(name, stock, price);
                    }

                    let classTerpilih = isSelected ? "terpilih" : "";
                    html += `
                        <div class="opsi-shopee ${classTerpilih}" onclick="pilihOpsiShopee(this, '${id}', '${name}', ${price}, ${stock})">
                            <div style="font-size: 13px; font-weight: 600; color: #fff;">
                                ${name} <span style="color: #8b8da9; font-size: 11px; font-weight: normal; margin-left: 4px;">(${stock.toLocaleString('id-ID')} stok)</span>
                            </div>
                            <div style="color: #b4b7ff; font-weight: bold; font-size: 13px;">Rp ${price.toLocaleString('id-ID')}</div>
                        </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = `<div style="padding: 20px; text-align: center; color: #8b8da9; font-size: 12px; font-style: italic;">Layanan tidak ditemukan...</div>`;
            }
        }

        function updateTeksHeaderTerpilih(nama, stok, harga) {
            document.getElementById("txtLayananTerpilihHeader").innerHTML = `
                ${nama} <span style="color: #8b8da9; font-size: 11px; font-weight: normal; margin-left:5px;">(${stok.toLocaleString('id-ID')} stok)</span> 
                — <span style="color:#00ffcc;">Rp ${harga.toLocaleString('id-ID')}</span>`;
        }

        function pilihOpsiShopee(elemen, id, nama, harga, stok) {
            idLayananTerpilih = id; namaLayananTerpilih = nama; hargaLayananTerpilih = harga;
            updateTeksHeaderTerpilih(nama, stok, harga);
            renderDaftarLayanan(); toggleMekanismeDropdown();
        }

        async function prosesPesanSekarang() {
            const apiKey = localStorage.getItem("otp_key_reseller");
            if(!idLayananTerpilih) { alert("Pilih layanan terlebih dahulu!"); return; }
            if(!apiKey) { toggleApiKeyDropdown(); return; }

            const btn = document.getElementById("btnPesanUtama");
            const teksAsli = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin" style="margin-right:5px;"></i> Memproses Order...`;

            printLog(`Meminta nomor untuk ${namaLayananTerpilih}...`);
            try {
                const data = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/order.php?api_key=${apiKey}`, true, {
                    api_key: apiKey,
                    product_id: idLayananTerpilih,
                    country_id: 7
                });

                if (data.order_id || data.phone || (data.status && (data.status === true || data.status === "success"))) {
                    saldoSekarangGlobal = Math.max(0, saldoSekarangGlobal - hargaLayananTerpilih);
                    document.getElementById("txtSaldoLive").innerText = "Rp " + saldoSekarangGlobal.toLocaleString("id-ID");
                    
                    let oid = data.order_id || data.id || "ORD-" + Date.now();
                    let nomer = data.phone || data.number || data.nomor || "Proses...";

                    daftarOrderan.unshift({
                        order_id: oid, phone: nomer, layanan: namaLayananTerpilih,
                        harga: hargaLayananTerpilih, waktu_dibuat: Date.now(), status: "pending", otp: ""                  
                    });
                    renderUILayout(); simpanDaftarOrderanKeLokal();
                    printLog(`Nomor ${nomer} didapatkan!`);
                    ambilSaldoLive();
                } else { 
                    alert(`Gagal: ${data.message || data.msg || 'Stok habis / server sibuk'}`); 
                    printLog(`Gagal: ${data.message || 'Error server'}`);
                }
            } catch (e) { 
                printLog("Order Error: " + e.message); 
                alert("Gagal memproses pesanan: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = teksAsli;
            }
        }

        // UPDATE V9: FUNGSI BATAL PESANAN DENGAN METODE POST DAN VALIDASI KETAT
        async function eksekusiBatalkanServer(index) {
            const apiKey = localStorage.getItem("otp_key_reseller"); if (!apiKey) return;
            const item = daftarOrderan[index];
            printLog(`Membatalkan order ${item.phone} ke server...`);
            
            try {
                // Mengirimkan via POST & GET sekaligus agar diterima sistem OTPInstan
                const res = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/cancel.php?order_id=${item.order_id}&api_key=${apiKey}&t=${Date.now()}`, true, {
                    api_key: apiKey,
                    order_id: item.order_id
                });
                
                // Cek verifikasi status keberhasilan dari server OTPInstan
                let isSuccess = res.status === true || res.status === "success" || res.status === "cancelled" || res.status === "ok" || (res.msg && (res.msg.toLowerCase().includes("berhasil") || res.msg.toLowerCase().includes("batal") || res.msg.toLowerCase().includes("cancel") || res.msg.toLowerCase().includes("dibatalkan")));

                if (isSuccess) {
                    item.status = "cancelled";
                    printLog(`✅ Pesanan ${item.phone} resmi dibatalkan.`);
                    showToast("Pesanan Berhasil Dibatalkan! ✨");
                    renderUILayout(); 
                    simpanDaftarOrderanKeLokal();
                    refreshSemuaDataLive();
                } else {
                    // Jika server OTPInstan menolak pembatalan
                    printLog(`❌ Gagal Batal: ${res.msg || res.message || 'Ditolak server'}`);
                    alert(`⚠️ Server OTPInstan menolak pembatalan:\n\n"${res.msg || res.message || 'Pesanan tidak dapat dibatalkan saat ini.'}"\n\n(Kemungkinan masa cooldown dari server pusat belum tercapai atau status order berubah)`);
                }
            } catch (e) {
                printLog("Error koneksi saat batal: " + e.message);
                alert("⚠️ Gagal terhubung ke server OTPInstan untuk membatalkan pesanan.\nPeriksa koneksi internet Anda atau coba lagi beberapa saat.");
            }
        }

        async function mesinCekSmsTerpusat() {
            const k = localStorage.getItem("otp_key_reseller"); if (!k) return;
            daftarOrderan.forEach(async (i) => {
                if (i.status !== "pending") return; 
                try {
                    const d = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/check.php?order_id=${i.order_id}&api_key=${k}&t=${Date.now()}`);
                    if (d.status === "received" || d.otp || d.sms) {
                        i.status = "received"; i.otp = d.otp || d.sms; putarSuaraNotif(); renderUILayout(); simpanDaftarOrderanKeLokal();
                        printLog(`🎉 OTP masuk untuk nomor ${i.phone}!`);
                    } else if (d.status === "cancelled" || d.status === "expired") {
                        i.status = "cancelled"; renderUILayout(); simpanDaftarOrderanKeLokal();
                    }
                } catch (e) {}
            });
        }

        function renderUILayout() {
            const container = document.getElementById("containerListOrder");
            if (daftarOrderan.length === 0) { container.innerHTML = `<div id="panelKosong" style="text-align: center; padding: 30px 10px; color: #6272a4; font-style: italic; font-size: 13px;">Belum ada pesanan aktif. Klik pesan di atas.</div>`; return; }
            let html = ""; let flagSimpan = false;
            daftarOrderan.forEach((item, index) => {
                let sec = Math.floor((Date.now() - item.waktu_dibuat) / 1000);
                if (item.status === "pending" && sec >= 1200) { item.status = "cancelled"; flagSimpan = true; }
                let sisa = Math.max(0, 1200 - sec); 
                
                // Cooldown 120 Detik sebelum tombol batalkan bisa diklik
                let cool = Math.max(0, 120 - sec);
                
                let textStat = `🔄 Menunggu SMS... (${sec}s)`; let colStat = "#ffb86c";
                if (item.status === "received") { textStat = `🎉 OTP: <span style="background:#50fa7b; color:#000; padding:2px 8px; border-radius:4px; font-weight:bold; font-size:16px;">${item.otp}</span> <span onclick="salinTeksToast('${item.otp}')" style="cursor:pointer; font-size:15px; color:#50fa7b; margin-left:8px;">📝</span>`; colStat = "#50fa7b"; } 
                else if (item.status === "cancelled") { textStat = "❌ Dibatalkan / Expired"; colStat = "#ff5555"; }
                html += `
                    <div class="card-order">
                        <div style="font-size:11px; color:#aaa;">Server 1 · ${item.layanan}</div>
                        <div style="font-size:20px; font-weight:bold; color:#fff; margin:5px 0;">${item.phone} <span onclick="salinTeksToast('${item.phone}')" style="cursor:pointer; font-size:14px; color:#00ffcc;">📋</span></div>
                        <div style="font-size:13px; color:${colStat}; margin-top:5px;">${textStat}</div>
                        <div style="font-size:11px; color:#ffb86c; margin-top:5px;">⏱️ Expired: ${Math.floor(sisa/60)}m ${sisa%60}s</div>
                        ${item.status === "pending" ? `<button class="btn-batal" ${cool>0?'disabled':''} onclick="eksekusiBatalkanServer(${index})">${cool>0?`Batalkan (Tunggu ${cool}s)`:'❌ Batalkan Pesanan'}</button>` : ''}
                    </div>`;
            });
            container.innerHTML = html; if (flagSimpan) simpanDaftarOrderanKeLokal();
        }

        function mesinWaktuTerpusat() { if (daftarOrderan.some(i => i.status === "pending")) renderUILayout(); }
        function simpanDaftarOrderanKeLokal() { localStorage.setItem("daftar_orderan_live", JSON.stringify(daftarOrderan)); }
        function putarSuaraNotif() { try { const ctx = new (window.AudioContext || window.webkitAudioContext)(); if (!ctx) return; const playTone = (freq, start, dur) => { const osc = ctx.createOscillator(); const gain = ctx.createGain(); osc.type = 'sine'; osc.frequency.setValueAtTime(freq, ctx.currentTime + start); gain.gain.setValueAtTime(0.3, ctx.currentTime + start); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + start + dur); osc.connect(gain); gain.connect(ctx.destination); osc.start(ctx.currentTime + start); osc.stop(ctx.currentTime + start + dur); }; playTone(587.33, 0, 0.3); playTone(880, 0.14, 0.4); } catch (e) {} }
        function hapusRiwayatSelesai() { daftarOrderan = daftarOrderan.filter(i => i.status === "pending"); renderUILayout(); simpanDaftarOrderanKeLokal(); printLog("Riwayat dibersihkan."); }
        function salinTeksToast(txt) { navigator.clipboard.writeText(txt); showToast("Disalin! ✨"); }
        function showToast(m) { const t = document.getElementById('toastNotif'); t.innerText = m; t.classList.add('show'); setTimeout(() => { t.classList.remove('show'); }, 2000); }
        function printLog(t) { document.getElementById("miniConsoleLog").innerText = "└> " + t; }
    </script>
</body>
</html>
