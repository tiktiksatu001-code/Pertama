<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSCode.gg Shopee Panel</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg-main: #0b0c16; --bg-card: #121324; --bg-item: #181933; --border-color: #2c2e5c; --accent-cyan: #00ffcc; --accent-purple: #6c5ce7; --accent-red: #ff5555; --accent-green: #50fa7b; --text-main: #f8f8f2; --text-sub: #8b8da9; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { background-color: var(--bg-main); color: var(--text-main); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 480px; background: var(--bg-card); border-radius: 14px; border: 1px solid var(--border-color); padding: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.6); margin-bottom: 10px; }
        .pemicu-dropdown { background: var(--bg-item); border: 1px solid #32356b; border-radius: 12px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: bold; font-size: 13px; color: #fff; user-select: none; }
        .search-input { width: 100%; padding: 10px; border-radius: 8px; background: #0b0c16; border: 1px solid #3d3463; color: #fff; font-size: 13px; outline: none; margin-bottom: 6px; }
        .search-input:focus { border-color: var(--accent-cyan); }
        .card-order { background: #1a1b35; border: 1px solid var(--border-color); border-radius: 10px; padding: 12px; margin-top: 12px; }
        .box-copy-statik { display: flex; justify-content: space-between; align-items: center; background: #131428; padding: 8px 10px; border-radius: 8px; border: 1px solid #222448; margin: 6px 0; }
        .box-copy-statik.otp-masuk { background: #152923; border-color: #24523b; }
        .btn-copy-static { background: #25274d; border: 1px solid #3d3f7a; color: var(--accent-cyan); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
        .btn-copy-static.btn-green { background: #1d3f31; border-color: #2e6f4e; color: var(--accent-green); }
        .btn-batal { background: var(--accent-red); color: white; border: none; padding: 8px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #00ffcc; color: #0f0c1b; padding: 8px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; opacity: 0; z-index: 99; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* === GAYA UI APLIKASI NATIVE (INDONESIA SHOPEE) === */
        .app-ui-container { background: #ffffff; border-radius: 16px; padding: 12px; margin-top: 12px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .app-header-nav { display: flex; align-items: center; justify-content: space-between; padding: 5px 10px 15px 10px; border-bottom: 1px solid #f1f5f9; }
        .app-header-left { display: flex; align-items: center; gap: 15px; }
        .app-header-text { line-height: 1.3; }
        .operator-item { border-bottom: 1px solid #f1f5f9; background: #ffffff; border-radius: 12px; margin-bottom: 5px; }
        .operator-header { padding: 14px 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border-radius: 12px; transition: background 0.2s; }
        .operator-header:hover { background: #f8fafc; }
        .op-info { display: flex; align-items: center; gap: 12px; }
        .op-dot { width: 10px; height: 10px; background: #a3e635; border-radius: 50%; box-shadow: 0 0 4px rgba(163, 230, 53, 0.5); }
        .op-title { font-weight: 600; font-size: 14px; color: #1e293b; }
        .op-sub { font-size: 11px; color: #64748b; margin-top: 2px; }
        .server-list { display: none; background: #ffffff; padding: 0; border-top: 1px solid #f1f5f9; border-radius: 0 0 12px 12px; overflow-y: auto; max-height: 350px; }
        .server-list.active { display: block; }
        .server-row { padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f8fafc; }
        .server-row:last-child { border-bottom: none; }
        .srv-left { display: flex; align-items: center; gap: 12px; }
        .srv-title { font-weight: 600; font-size: 13.5px; color: #334155; }
        .srv-stock { font-size: 11px; color: #94a3b8; margin-top: 2px; }
        .srv-right { display: flex; align-items: center; gap: 14px; }
        .srv-price { font-weight: 700; font-size: 14px; color: #1e293b; display: flex; align-items: center; gap: 5px; }
        .coin-icon { color: #fbbf24; font-size: 15px; }
        .btn-buy-app { background: #3b82f6; color: #ffffff; border: none; padding: 6px 18px; border-radius: 20px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 6px rgba(59, 130, 246, 0.3); }
        .btn-buy-app:hover { background: #2563eb; transform: scale(0.98); }
        .btn-buy-app:disabled { background: #94a3b8; cursor: not-allowed; box-shadow: none; }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER SALDO -->
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; margin-bottom: 12px;">
            <h3 style="color: #fff; margin: 0; font-size: 15px; font-weight: 600;">🔵 Server 2 (Shopee ID)</h3>
            <div style="background: var(--bg-item); border: 1px solid var(--border-color); padding: 5px 12px; border-radius: 20px; display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: bold; color: var(--accent-green);">
                👛 <span id="txtSaldoLive">Rp 0</span>
                <span onclick="refreshSemuaDataLive()" style="cursor: pointer; font-size: 11px; color: var(--accent-cyan); margin-left: 4px;">🔄</span>
            </div>
        </div>

        <!-- SETTING TOKEN -->
        <div style="margin-bottom: 12px;">
            <div class="pemicu-dropdown" onclick="toggleApiKeyDropdown()">
                <span>🔑 Set Bearer Token API</span>
                <span id="panahApiKey" style="font-size: 10px;">▼</span>
            </div>
            <div id="wadahApiKeyDropdown" style="display: none; background: var(--bg-item); padding: 12px; border-radius: 0 0 10px 10px; border: 1px solid #222448; border-top: none; margin-top: -2px;">
                <label style="font-size: 11px; color: var(--accent-cyan); font-weight: bold; margin-bottom:4px; display:block;">🔑 Bearer Token:</label>
                <div style="display: flex; gap: 6px;">
                    <input type="password" id="otpKeyV5" placeholder="Token API" class="search-input" style="margin-bottom:0;">
                    <button onclick="simpanKonfigurasi()" style="padding: 8px 12px; background: var(--accent-cyan); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 11px;">Simpan</button>
                </div>
                <small id="statusKeyV5" style="color: var(--accent-red); font-size: 10px; display: block; margin-top: 6px;">⚠️ Token belum aktif.</small>
            </div>
        </div>

        <!-- UI APLIKASI NATIVE (INDONESIA) -->
        <div class="app-ui-container">
            <div class="app-header-nav">
                <div class="app-header-left">
                    <i class="fa-solid fa-chevron-left" style="color:#0f172a; font-size: 16px; cursor: pointer;"></i>
                    <div class="app-header-text">
                        <div style="font-weight: 700; font-size: 16px; color: #0f172a; letter-spacing: -0.3px;">Indonesia 🇮🇩</div>
                        <div style="font-size: 12px; color: #64748b;">Shopee · Select an operator</div>
                    </div>
                </div>
                <i class="fa-solid fa-rotate-right" onclick="muatKatalogShopeeID()" style="color: #3b82f6; font-size: 16px; cursor: pointer; padding: 5px;" title="Refresh Katalog"></i>
            </div>
            <div id="operatorAccordionContainer" style="margin-top: 10px;">
                <div style="padding: 30px; text-align: center; color: #94a3b8;">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 24px; color: #3b82f6;"></i>
                    <div style="margin-top: 10px; font-size: 13px;">Memuat Operator Indonesia...</div>
                </div>
            </div>
        </div>

        <!-- RIWAYAT / NOMOR AKTIF -->
        <div style="margin-top: 18px; border-top: 2px dashed var(--border-color); padding-top: 12px;">
            <div style="font-size: 13px; font-weight: bold; color: var(--accent-green); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                <span>📱 Nomor & OTP Aktif:</span>
                <span onclick="hapusRiwayatSelesai()" style="cursor: pointer; font-size: 10px; color: var(--accent-red); background: var(--bg-item); padding: 3px 8px; border-radius: 4px; border: 1px solid var(--border-color);">🧹 Bersihkan</span>
            </div>
            <div id="containerListOrder">
                <div id="panelKosong" style="text-align: center; padding: 20px 10px; color: #6272a4; font-style: italic; font-size: 12px;">Belum ada pesanan aktif.</div>
            </div>
        </div>

        <div id="miniConsoleLog" style="margin-top: 12px; padding: 8px; background: var(--bg-main); border-radius: 6px; font-family: monospace; font-size: 10px; color: var(--accent-green); border: 1px solid var(--border-color); word-break: break-all; max-height: 100px; overflow-y: auto;">
            └> Shopee ID Filter Ready.
        </div>
    </div>
    
    <div class="toast" id="toastNotif">Berhasil! ✨</div>

    <script>
        let daftarOrderan = []; 
        let dataKatalogLayanan = [];

        async function apiSMSCode(endpoint, method = "GET", payload = null) {
            const token = localStorage.getItem("otp_key_smscode");
            if (!token) throw new Error("Bearer Token belum disetting.");

            let targetUrl = `https://api.smscode.gg/v1/${endpoint}`;
            if (method === "GET") { 
                targetUrl += (targetUrl.includes('?') ? '&' : '?') + `nocache=${Date.now()}`; 
            }
            
            let headers = { "Authorization": `Bearer ${token.trim()}`, "Content-Type": "application/json", "Accept": "application/json" };
            let options = { method: method, headers: headers };
            if (payload && method !== "GET") options.body = JSON.stringify(payload);

            const proxies = [ 
                { url: "", encode: false }, 
                { url: "https://api.codetabs.com/v1/proxy?quest=", encode: false }, 
                { url: "https://corsproxy.io/?", encode: true }
            ];

            let networkError = null;

            for (let proxy of proxies) {
                try {
                    let proxyUrl = targetUrl;
                    if (proxy.url !== "") { 
                        proxyUrl = proxy.encode ? proxy.url + encodeURIComponent(targetUrl) : proxy.url + targetUrl; 
                    }
                    
                    const res = await fetch(proxyUrl, options);
                    const textResponse = await res.text();
                    
                    let data = {};
                    if (textResponse && textResponse.trim() !== "") {
                        try { data = JSON.parse(textResponse); } catch (err) {}
                    }
                    
                    if (!res.ok) {
                        let msg = data.error?.message || data.message || `HTTP ${res.status}`;
                        throw new Error(`[HTTP ${res.status}] ${msg}`);
                    }
                    return data; 
                } catch (e) { 
                    if (e.message.includes("[HTTP")) throw e; 
                    networkError = e; 
                }
            }
            throw new Error(networkError ? networkError.message : "Gagal koneksi jaringan.");
        }

        document.addEventListener("DOMContentLoaded", function() {
            const savedKey = localStorage.getItem("otp_key_smscode");
            if(savedKey) {
                document.getElementById("otpKeyV5").value = savedKey;
                document.getElementById("statusKeyV5").innerText = "✅ Token Aktif.";
                document.getElementById("statusKeyV5").style.color = "#50fa7b";
                refreshSemuaDataLive();
            } else {
                toggleApiKeyDropdown();
            }

            const orderanLokal = localStorage.getItem("daftar_orderan_srv2_shopee");
            if (orderanLokal) { daftarOrderan = JSON.parse(orderanLokal); renderUILayout(); }

            if(savedKey) muatKatalogShopeeID();

            setInterval(mesinWaktuTerpusat, 1000);
            setInterval(mesinCekSmsTerpusat, 2000); 
        });

        /* === TARIK KHUSUS SHOPEE INDONESIA (COUNTRY_ID = 7) === */
        async function muatKatalogShopeeID() {
            try {
                printLog("🔄 Menarik produk Shopee Indonesia (ID 7)...");
                
                // Berdasarkan dokumentasi, filter negara menggunakan ?country_id=7
                // Kita juga menyertakan limit besar agar semua server muncul
                const res = await apiSMSCode('catalog/products?country_id=7&limit=100', 'GET');
                let arrData = res.data;
                
                if (!Array.isArray(arrData)) {
                    throw new Error("Format data tidak valid.");
                }

                // Saring ketat khusus layanan Shopee di Indonesia
                let shopeeID = arrData.filter(item => {
                    let namaProd = (item.name || "").toLowerCase();
                    return namaProd.includes("shopee");
                });

                printLog(`✅ Ditemukan ${shopeeID.length} server Shopee ID!`);

                let groupedOps = {};
                shopeeID.forEach(item => {
                    // Mendeteksi operator seperti Any, Telkomsel, Indosat, XL/Axis, dll.
                    let opName = item.operator_name || item.operator || "Any";
                    if (!opName || opName.toLowerCase() === "any") opName = "Any";
                    
                    if (!groupedOps[opName]) groupedOps[opName] = [];
                    
                    groupedOps[opName].push({
                        id: item.id || item.product_id, 
                        name: item.name || `Server ${groupedOps[opName].length + 1}`,
                        stock: item.available || item.stock || 0, 
                        price: item.price || 0 
                    });
                });

                let newKatalog = [];
                for (let op in groupedOps) {
                    newKatalog.push({
                        id: op.toLowerCase().replace(/[^a-z0-9]/g, ''),
                        name: op,
                        servers: groupedOps[op].sort((a, b) => a.price - b.price) 
                    });
                }
                
                // Urutkan agar "Any" berada di barisan paling atas
                newKatalog.sort((a, b) => a.name === "Any" ? -1 : (b.name === "Any" ? 1 : 0));
                dataKatalogLayanan = newKatalog;
                renderMenuLayananApp(dataKatalogLayanan);

            } catch (e) {
                printLog(`⚠️ Error Katalog: ${e.message}`);
                document.getElementById("operatorAccordionContainer").innerHTML = `
                <div style="padding: 20px; text-align: center; color: #e11d48; font-size: 13px;">
                    Gagal memuat katalog: ${e.message}
                </div>`;
            }
        }

        function renderMenuLayananApp(katalogData) {
            const container = document.getElementById("operatorAccordionContainer");
            if(katalogData.length === 0) {
                container.innerHTML = `<div style="padding: 20px; text-align: center; color: #64748b; font-size: 13px;">Tidak ada layanan Shopee Indonesia ditemukan.</div>`;
                return;
            }

            let html = "";
            katalogData.forEach(op => {
                let isAvailable = op.servers.length > 0;
                let dotColor = isAvailable ? "#a3e635" : "#cbd5e1";
                let shadowColor = isAvailable ? "rgba(163, 230, 53, 0.5)" : "transparent";
                
                html += `
                <div class="operator-item">
                    <div class="operator-header" onclick="toggleMenuLayanan('${op.id}')">
                        <div class="op-info">
                            <div class="op-dot" style="background: ${dotColor}; box-shadow: 0 0 4px ${shadowColor};"></div>
                            <div>
                                <div class="op-title">${op.name}</div>
                                <div class="op-sub">${isAvailable ? 'Available' : 'Out of stock'}</div>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-down" id="icon-op-${op.id}" style="color: #cbd5e1; font-size: 14px; transition: transform 0.3s ease;"></i>
                    </div>
                    <div class="server-list" id="list-op-${op.id}"></div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function toggleMenuLayanan(opId) {
            document.querySelectorAll('.server-list').forEach(el => { if(el.id !== `list-op-${opId}`) el.classList.remove('active'); });
            document.querySelectorAll('.fa-chevron-down').forEach(el => { if(el.id !== `icon-op-${opId}`) el.style.transform = "rotate(0deg)"; });

            const listEl = document.getElementById(`list-op-${opId}`);
            const iconEl = document.getElementById(`icon-op-${opId}`);

            if (listEl.classList.contains('active')) {
                listEl.classList.remove('active');
                iconEl.style.transform = "rotate(0deg)";
            } else {
                listEl.classList.add('active');
                iconEl.style.transform = "rotate(180deg)";
                listEl.innerHTML = `<div style="text-align: center; padding: 25px;"><i class="fa-solid fa-spinner fa-spin" style="color: #3b82f6; font-size: 22px;"></i></div>`;
                setTimeout(() => { renderIsiServerMenu(opId, listEl); }, 250); 
            }
        }

        function renderIsiServerMenu(opId, listEl) {
            const op = dataKatalogLayanan.find(o => o.id === opId);
            if(!op || op.servers.length === 0) {
                listEl.innerHTML = `<div style="padding: 20px; text-align: center; color: #94a3b8; font-size: 13px; font-weight: 500;">No servers available.</div>`;
                return;
            }
            
            let html = "";
            op.servers.forEach(srv => {
                html += `
                <div class="server-row">
                    <div class="srv-left">
                        <div class="op-dot" style="background: #a3e635; box-shadow: 0 0 4px rgba(163, 230, 53, 0.5);"></div>
                        <div>
                            <div class="srv-title">${srv.name}</div>
                            <div class="srv-stock">${parseInt(srv.stock).toLocaleString('id-ID')} available</div>
                        </div>
                    </div>
                    <div class="srv-right">
                        <div class="srv-price"><i class="fa-solid fa-circle-dollar-to-slot coin-icon"></i> ${parseInt(srv.price).toLocaleString('id-ID')}</div>
                        <button class="btn-buy-app" id="btn-buy-${srv.id}" onclick="eksekusiBeliServer(this, ${srv.id}, ${srv.price}, '${op.name} - ${srv.name}')">Buy</button>
                    </div>
                </div>`;
            });
            listEl.innerHTML = html;
        }

        async function eksekusiBeliServer(btnElement, productId, price, fullServiceName) {
            const token = localStorage.getItem("otp_key_smscode");
            if (!token) { alert("Sila atur Bearer Token Anda!"); toggleApiKeyDropdown(); return; }

            const teksAsli = btnElement.innerHTML; 
            btnElement.disabled = true; 
            btnElement.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
            printLog(`Memesan dari ${fullServiceName}...`);

            try {
                const payloadOrder = { product_id: productId, quantity: 1 };
                const responseData = await apiSMSCode('orders/create', 'POST', payloadOrder);
                const createdOrder = responseData.data?.orders?.[0];

                if (createdOrder && (createdOrder.id || createdOrder.phone_number)) {
                    let orderBaru = { 
                        order_id: createdOrder.id, 
                        phone: createdOrder.phone_number, 
                        layanan: fullServiceName,
                        waktu_dibuat: Date.now(), status: "pending", otp: "" 
                    };
                    daftarOrderan.unshift(orderBaru); 
                    renderUILayout(); simpanDaftarOrderanKeLokal();
                    printLog(`🎉 Nomor didapatkan: ${createdOrder.phone_number}`); 
                    ambilSaldoLive();
                } else { throw new Error("Respon pesanan ditolak sistem."); }
            } catch (e) { 
                alert("Gagal order:\n" + e.message); printLog(`Error: ${e.message}`);
            } finally { 
                btnElement.disabled = false; btnElement.innerHTML = teksAsli; 
            }
        }

        function toggleApiKeyDropdown() {
            const w = document.getElementById("wadahApiKeyDropdown");
            w.style.display = (w.style.display === "none" || w.style.display === "") ? "block" : "none";
        }

        function simpanKonfigurasi() {
            const key = document.getElementById("otpKeyV5").value.trim();
            if(!key) { alert("Masukkan Token!"); return; }
            
            localStorage.setItem("otp_key_smscode", key);
            document.getElementById("statusKeyV5").innerText = "✅ Token Disimpan!";
            document.getElementById("statusKeyV5").style.color = "#50fa7b";
            
            refreshSemuaDataLive(); 
            toggleApiKeyDropdown();
        }

        function refreshSemuaDataLive() { ambilSaldoLive(); muatKatalogShopeeID(); }

        async function ambilSaldoLive() {
            try {
                const d = await apiSMSCode('balance', 'GET'); 
                let saldoVal = d.data?.balance || 0;
                document.getElementById("txtSaldoLive").innerText = "Rp " + parseInt(saldoVal).toLocaleString("id-ID");
            } catch(e) { document.getElementById("txtSaldoLive").innerText = "Error"; }
        }

        async function eksekusiBatalkanServer(index) {
            const item = daftarOrderan[index];
            try {
                await apiSMSCode(`orders/cancel`, 'POST', { id: item.order_id });
                item.status = "cancelled"; 
                showToast("Dibatalkan!"); 
                renderUILayout(); simpanDaftarOrderanKeLokal(); ambilSaldoLive();
            } catch (e) { alert("Gagal membatalkan."); }
        }

        async function mesinCekSmsTerpusat() {
            daftarOrderan.forEach(async (i) => {
                if (i.status !== "pending") return; 
                try {
                    const d = await apiSMSCode(`orders/${i.order_id}`, 'GET');
                    let orderData = d.data; 
                    if(!orderData) return;
                    
                    let stat = orderData.status;
                    let otpCode = orderData.otp_code; 

                    if (stat === "OTP_RECEIVED" || otpCode) {
                        i.status = "received"; i.otp = otpCode; 
                        putarSuaraNotif(); munculkanPopupNative(i.phone, i.otp, i.layanan);
                        renderUILayout(); simpanDaftarOrderanKeLokal(); printLog(`🎉 OTP MASUK (${i.otp})!`);
                    } else if (stat === "CANCELED" || stat === "CANCELLED" || stat === "EXPIRED" || stat === "REFUNDED") {
                        i.status = "cancelled"; renderUILayout(); simpanDaftarOrderanKeLokal(); ambilSaldoLive();
                    }
                } catch (e) {}
            });
        }

        function renderUILayout() {
            const container = document.getElementById("containerListOrder");
            if (daftarOrderan.length === 0) { container.innerHTML = `<div style="text-align: center; padding: 20px 10px; color: #6272a4; font-style: italic; font-size: 11px;">Belum ada pesanan aktif.</div>`; return; }
            let html = ""; let flagSimpan = false;
            daftarOrderan.forEach((item, index) => {
                let sec = Math.floor((Date.now() - item.waktu_dibuat) / 1000);
                if (item.status === "pending" && sec >= 1200) { item.status = "cancelled"; flagSimpan = true; }
                let sisa = Math.max(0, 1200 - sec); let cool = Math.max(0, 120 - sec);
                let textStat = `⚡ Cek OTP... (${sec}s)`; let colStat = "#ffb86c"; let kotakOtp = "";

                if (item.status === "received") { 
                    textStat = `🎉 SMS/OTP Diterima!`; colStat = "#50fa7b"; 
                    kotakOtp = `<div class="box-copy-statik otp-masuk"><div><div style="font-size:9px; color:#50fa7b; font-weight:bold;">Kode OTP:</div><div style="font-size:18px; font-weight:bold; color:#50fa7b;">${item.otp}</div></div><button onclick="salinTeksToast('${item.otp}')" class="btn-copy-static btn-green"><i class="fa-regular fa-copy"></i> Salin OTP</button></div>`;
                } else if (item.status === "cancelled") { textStat = "❌ Dibatalkan"; colStat = "#ff5555"; }
                
                html += `<div class="card-order"><div style="display:flex; justify-content:space-between; font-size:10px; color:#aaa; margin-bottom:5px;"><span>${item.layanan}</span><span>⏱️ ${Math.floor(sisa/60)}m ${sisa%60}s</span></div><div class="box-copy-statik"><div><div style="font-size:9px; color:#8b8da9;">Nomor HP:</div><div style="font-size:15px; font-weight:bold; color:#fff; margin-top:2px;">${item.phone}</div></div><button onclick="salinTeksToast('${item.phone}')" class="btn-copy-static"><i class="fa-regular fa-copy"></i> Salin</button></div>${kotakOtp}<div style="font-size:11px; font-weight:600; color:${colStat}; margin-top:6px;">${textStat}</div>${item.status === "pending" ? `<button class="btn-batal" ${cool>0?'disabled':''} onclick="eksekusiBatalkanServer(${index})">${cool>0?`Batalkan (${cool}s)`:'❌ Batalkan Pesanan'}</button>` : ''}</div>`;
            });
            container.innerHTML = html; if (flagSimpan) simpanDaftarOrderanKeLokal();
        }

        function simpanDaftarOrderanKeLokal() { localStorage.setItem("daftar_orderan_srv2_shopee", JSON.stringify(daftarOrderan)); }
        function hapusRiwayatSelesai() { daftarOrderan = daftarOrderan.filter(i => i.status === "pending"); renderUILayout(); simpanDaftarOrderanKeLokal(); showToast("Dibersihkan!"); }
        function mesinWaktuTerpusat() { if (daftarOrderan.some(i => i.status === "pending")) renderUILayout(); }
        function printLog(t) { 
            const consoleBox = document.getElementById("miniConsoleLog");
            consoleBox.innerHTML += `<br>└> ${t}`; 
            consoleBox.scrollTop = consoleBox.scrollHeight; 
        }
        function showToast(m) { const t = document.getElementById('toastNotif'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 1500); }
        function salinTeksToast(txt) { navigator.clipboard.writeText(txt); showToast("Disalin!"); }

        function putarSuaraNotif() {
            try { const audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const notes = [523.25, 659.25, 783.99, 1046.50]; let time = audioCtx.currentTime; for (let r = 0; r < 2; r++) { notes.forEach((freq) => { const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain(); osc.type = "sawtooth"; osc.frequency.setValueAtTime(freq, time); gain.gain.setValueAtTime(0.2, time); gain.gain.exponentialRampToValueAtTime(0.01, time + 0.15); osc.connect(gain); gain.connect(audioCtx.destination); osc.start(time); osc.stop(time + 0.2); time += 0.08; }); time += 0.15; } } catch (e) {}
        }
        function munculkanPopupNative(nomor, otp, layanan) {
            if (window.cordova && cordova.plugins && cordova.plugins.notification && cordova.plugins.notification.local) {
                cordova.plugins.notification.local.schedule({ id: Math.floor(Date.now() / 1000), title: `🎉 OTP MASUK (${layanan})`, text: `KODE OTP: ${otp}  (No: ${nomor})`, foreground: true, vibrate: true, priority: 2, wakeup: true });
            } 
        }
    </script>
</body>
</html>
