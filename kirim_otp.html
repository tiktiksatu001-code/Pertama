<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Otomatis OTP - Multi Server (v16.1)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0c16; --bg-card: #121324; --bg-item: #181933;
            --border-color: #2c2e5c; --accent-cyan: #00ffcc; --accent-purple: #6c5ce7;
            --accent-red: #ff5555; --accent-green: #50fa7b; --text-main: #f8f8f2; --text-sub: #8b8da9;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body {
            background-color: var(--bg-main); color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .container {
            width: 100%; max-width: 500px; background: var(--bg-card); border-radius: 18px;
            border: 1px solid var(--border-color); padding: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); margin-bottom: 20px;
        }

        .badge-promo { background: #3c1e70; color: #b4b7ff; font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: bold; }
        
        .pemicu-dropdown, .pemicu-server {
            background: var(--bg-item); border: 1px solid #32356b; border-radius: 12px;
            padding: 14px 16px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-weight: bold; font-size: 14px; color: #fff; user-select: none;
        }
        .pemicu-dropdown:hover, .pemicu-server:hover { background: #1e2042; }
        
        .wrapper-layanan {
            background: var(--bg-item); border: 1px solid #32356b; border-top: none;
            border-radius: 0 0 12px 12px; overflow: hidden; margin-top: -1px;
            display: none; position: relative; z-index: 10;
        }
        .search-box-container { padding: 10px; background: #15102a; border-bottom: 1px solid #2c2e5c; position: sticky; top: 0; z-index: 11; }
        .search-input { width: 100%; padding: 10px; border-radius: 8px; background: #0b0c16; border: 1px solid #3d3463; color: #fff; font-size: 13px; outline: none; }
        .search-input:focus { border-color: var(--accent-cyan); }
        .scrollable-list { max-height: 250px; overflow-y: auto; }
        
        .opsi-shopee { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #222448; }
        .opsi-shopee:last-child { border-bottom: none; }
        .opsi-shopee:hover { background: #20224a; }
        .opsi-shopee.terpilih { background: #2a2c63; border-left: 4px solid var(--accent-purple); }
        
        .btn-pesan-premium {
            width: 100%; padding: 14px; background: #5f27cd; color: white; border: none;
            border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer;
            text-transform: uppercase; margin-top: 15px; box-shadow: 0 4px 12px rgba(95, 39, 205, 0.4);
        }
        .btn-pesan-premium:hover:not(:disabled) { background: var(--accent-purple); }
        .btn-pesan-premium:disabled { background: #44475a !important; color: #888 !important; cursor: not-allowed !important; box-shadow: none !important; }
        
        .card-order { background: #1a1b35; border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-top: 15px; }
        
        .box-copy-statik { display: flex; justify-content: space-between; align-items: center; background: #131428; padding: 10px 12px; border-radius: 8px; border: 1px solid #222448; margin: 8px 0; }
        .box-copy-statik.otp-masuk { background: #152923; border-color: #24523b; }
        .btn-copy-static { background: #25274d; border: 1px solid #3d3f7a; color: var(--accent-cyan); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
        .btn-copy-static:hover { background: #323568; transform: scale(1.03); }
        .btn-copy-static.btn-green { background: #1d3f31; border-color: #2e6f4e; color: var(--accent-green); }
        .btn-copy-static.btn-green:hover { background: #265340; }
        
        .btn-batal { background: var(--accent-red); color: white; border: none; padding: 10px 12px; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 12px; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .btn-batal:hover:not(:disabled) { background: #ff3333; }
        .btn-batal:disabled { background: #2f3148; color: #727598; cursor: not-allowed; border: 1px solid #3d3f5e; }
        
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: #00ffcc; color: #0f0c1b; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 14px; opacity: 0; z-index: 99; transition: transform 0.3s ease, opacity 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER MULTI SERVER -->
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 15px;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <select id="pilihServerApi" onchange="gantiServerApi()" style="background: var(--bg-item); color: #fff; border: 1px solid var(--accent-cyan); padding: 5px 10px; border-radius: 8px; font-weight: bold; font-size: 14px; outline: none;">
                    <option value="1">🟢 Server 1 (OTPInstan)</option>
                    <option value="2">🔵 Server 2 (SMSCode.gg)</option>
                </select>
                <span class="badge-promo">v16.1 SmartFix</span>
            </div>
            
            <div style="background: var(--bg-item); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; color: var(--accent-green);">
                👛 <span id="txtSaldoLive">Rp 0</span>
                <span onclick="refreshSemuaDataLive()" style="cursor: pointer; font-size: 12px; color: var(--accent-cyan); margin-left: 5px;" title="Refresh Data">🔄</span>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <div class="pemicu-dropdown" onclick="toggleApiKeyDropdown()" style="padding: 12px 16px; border-radius: 10px; font-size: 13px; color: var(--accent-cyan);">
                <span id="judulSettingKey">🔑 Set API Key (Server 1)</span>
                <span id="panahApiKey" style="transition: transform 0.2s; font-size: 11px;">▼</span>
            </div>

            <div id="wadahApiKeyDropdown" style="display: none; background: var(--bg-item); padding: 12px; border-radius: 0 0 10px 10px; border: 1px solid #222448; border-top: none; margin-top: -2px;">
                <label style="font-size: 11px; color: var(--accent-cyan); font-weight: bold;" id="labelInputKey">🔑 Masukkan API Key / Bearer Token:</label>
                <div style="display: flex; margin-top: 5px; gap: 8px;">
                    <input type="password" id="otpKeyV5" placeholder="Masukkan token API" class="search-input">
                    <button onclick="simpanKeyV5()" style="padding: 10px 12px; background: var(--accent-cyan); color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px;">Simpan</button>
                </div>
                <small id="statusKeyV5" style="color: var(--accent-red); font-size: 11px; display: block; margin-top: 6px;">⚠️ API Key belum aktif untuk server ini.</small>
            </div>
        </div>

        <div>
            <label style="font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 5px;">Pilih Layanan</label>
            <div class="pemicu-dropdown" id="btnTriggerDropdown" onclick="toggleMekanismeDropdown()">
                <span id="txtLayananTerpilihHeader">Pilih Layanan / Menghubungkan...</span>
                <span id="ikonPanahDropdown" style="transition: transform 0.2s; font-size: 12px;">▼</span>
            </div>
            <div class="wrapper-layanan" id="boxLayananShopee">
                <div class="search-box-container">
                    <input type="text" id="cariLayanan" class="search-input" placeholder="Cari layanan (contoh: Shope/WhatsApp)" onkeyup="renderDaftarLayanan()">
                </div>
                <div id="listLayananRender" class="scrollable-list">
                    <div style="text-align: center; padding: 20px; color: #6272a4; font-style: italic; font-size: 13px;">Memuat data live server...</div>
                </div>
            </div>
            
            <button onclick="prosesPesanSekarang()" class="btn-pesan-premium" id="btnPesanUtama">
                <i class="fa-solid fa-cart-shopping" style="margin-right:5px;"></i> Pesan Sekarang
            </button>
        </div>

        <div style="margin-top: 25px; border-top: 2px dashed var(--border-color); padding-top: 15px;">
            <div style="font-size: 14px; font-weight: bold; color: var(--accent-green); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span>📱 Nomor & OTP Aktif:</span>
                <span onclick="hapusRiwayatSelesai()" style="cursor: pointer; font-size: 11px; color: var(--accent-red); background: var(--bg-item); padding: 4px 10px; border-radius: 5px; border: 1px solid var(--border-color); font-weight: normal;">🧹 Bersihkan Layar</span>
            </div>
            <div id="containerListOrder">
                <div id="panelKosong" style="text-align: center; padding: 30px 10px; color: #6272a4; font-style: italic; font-size: 13px;">Belum ada pesanan aktif. Klik pesan di atas.</div>
            </div>
        </div>

        <div id="miniConsoleLog" style="margin-top: 15px; padding: 8px; background: var(--bg-main); border-radius: 6px; font-family: monospace; font-size: 11px; color: var(--accent-green); border: 1px solid var(--border-color); word-break: break-all; max-height: 80px; overflow-y: auto;">
            └> System Ready (Smart Fetch Engine).
        </div>
    </div>
    <div class="toast" id="toastNotif">Berhasil! ✨</div>

    <script>
        let daftarOrderan = []; 
        let riwayatOrderan = []; 
        let saldoSekarangGlobal = 0;
        let globalListLayanan = []; 
        let idLayananTerpilih = null;
        let namaLayananTerpilih = "";
        let hargaLayananTerpilih = 0;
        
        // KONFIGURASI SERVER MULTIPLE
        let activeServerId = "1"; 

        // ==================== UPDATE v16.1: SMART FETCH ENGINE ====================
        async function fetchSmartProxy(targetUrl, isPost = false, postBody = null, authBearer = null) {
            let options = { method: isPost ? "POST" : "GET", headers: {} };
            
            // Atur Headers
            if (authBearer) {
                options.headers["Authorization"] = `Bearer ${authBearer}`;
                if (isPost) {
                    options.headers["Content-Type"] = "application/json";
                    options.body = JSON.stringify(postBody);
                }
            } else if (isPost && postBody) {
                options.headers["Content-Type"] = "application/x-www-form-urlencoded";
                options.body = new URLSearchParams(postBody).toString();
            }

            // PERCOBAAN 1: KONEKSI LANGSUNG (Tanpa Proxy) - Diutamakan untuk SMSCode
            try {
                const directRes = await fetch(targetUrl, options);
                const data = await directRes.json();
                // Mengembalikan data apapun hasilnya (meskipun error 401/404) agar bisa dibaca log-nya
                if (data) return data; 
            } catch (e) { 
                console.log("Direct connection failed, trying proxy...", e.message); 
            }

            // PERCOBAAN 2: JALUR PROXY (Hanya jika koneksi langsung diblokir total/CORS error)
            const proxies = ["https://corsproxy.io/?", "https://api.codetabs.com/v1/proxy?quest="];
            for (let proxy of proxies) {
                try {
                    let url = proxy.includes("corsproxy.io") ? proxy + encodeURIComponent(targetUrl) : proxy + targetUrl;
                    const res = await fetch(url, options);
                    const data = await res.json();
                    if (data) return data;
                } catch (e) { console.log("Jalur proxy gagal:", proxy); }
            }
            throw new Error("Semua jalur koneksi (Direct & Proxy) gagal terhubung ke server.");
        }

        document.addEventListener("DOMContentLoaded", function() {
            // Muat Preferensi Server
            const savedServer = localStorage.getItem("preferred_server_panel");
            if(savedServer) {
                document.getElementById("pilihServerApi").value = savedServer;
                activeServerId = savedServer;
            }
            gantiServerApi(true);

            const orderanLokal = localStorage.getItem("daftar_orderan_live");
            if (orderanLokal) { daftarOrderan = JSON.parse(orderanLokal); renderUILayout(); }

            setInterval(mesinWaktuTerpusat, 1000);
            setInterval(mesinCekSmsTerpusat, 2000); 
            setInterval(ambilLayananLive, 10000); 
        });

        function gantiServerApi(isInit = false) {
            activeServerId = document.getElementById("pilihServerApi").value;
            localStorage.setItem("preferred_server_panel", activeServerId);
            
            const serverName = activeServerId === "1" ? "OTPInstan" : "SMSCode.gg";
            document.getElementById("judulSettingKey").innerText = `🔑 Set API Key (Server ${activeServerId})`;
            
            const keyName = activeServerId === "1" ? "otp_key_reseller" : "otp_key_smscode";
            const savedKey = localStorage.getItem(keyName);
            
            document.getElementById("otpKeyV5").value = savedKey || "";
            if (savedKey) {
                document.getElementById("statusKeyV5").innerText = `✅ API Key Aktif untuk ${serverName}`;
                document.getElementById("statusKeyV5").style.color = "#50fa7b";
                if(!isInit) refreshSemuaDataLive(); 
            } else {
                document.getElementById("statusKeyV5").innerText = `⚠️ API Key belum aktif untuk ${serverName}.`;
                document.getElementById("statusKeyV5").style.color = "#ff5555";
                document.getElementById("txtLayananTerpilihHeader").innerText = "Masukkan API Key dahulu...";
                globalListLayanan = []; renderDaftarLayanan();
                document.getElementById("txtSaldoLive").innerText = "Rp 0";
            }
            
            if(isInit && savedKey) refreshSemuaDataLive();
        }

        function toggleApiKeyDropdown() {
            const w = document.getElementById("wadahApiKeyDropdown");
            w.style.display = w.style.display === "none" || w.style.display === "" ? "block" : "none";
        }
        function toggleMekanismeDropdown() {
            const box = document.getElementById("boxLayananShopee");
            box.style.display = box.style.display === "none" || box.style.display === "" ? "block" : "none";
        }

        function simpanKeyV5() {
            const key = document.getElementById("otpKeyV5").value.trim();
            if(!key) { alert("API Key tidak boleh kosong!"); return; }
            
            const keyName = activeServerId === "1" ? "otp_key_reseller" : "otp_key_smscode";
            localStorage.setItem(keyName, key);
            gantiServerApi(true); toggleApiKeyDropdown(); showToast("API Key Disimpan! ✨");
        }

        function refreshSemuaDataLive() { ambilSaldoLive(); ambilLayananLive(); }

        // ======================== API: AMBIL SALDO ========================
        async function ambilSaldoLive() {
            const keyName = activeServerId === "1" ? "otp_key_reseller" : "otp_key_smscode";
            const key = localStorage.getItem(keyName); if (!key) return;

            try {
                let d;
                if (activeServerId === "1") {
                    d = await fetchSmartProxy(`https://otpinstan.com/api/reseller/balance.php?api_key=${key}&t=${Date.now()}`);
                } else {
                    // Coba ke domain API resmi SMSCode.gg
                    d = await fetchSmartProxy(`https://api.smscode.gg/v1/balance?t=${Date.now()}`, false, null, key);
                }
                
                // Menampilkan log error asli jika server menolak token
                if (d.error || d.message) printLog(`[Srv ${activeServerId}] Info Balance: ` + (d.message || d.error));

                saldoSekarangGlobal = parseInt(d.balance || d.saldo || d.balance_reseller || d.amount || 0);
                document.getElementById("txtSaldoLive").innerText = "Rp " + saldoSekarangGlobal.toLocaleString("id-ID");
            } catch(e) { printLog("Gagal cek saldo: " + e.message); }
        }

        // ======================== API: AMBIL DAFTAR LAYANAN ========================
        async function ambilLayananLive() {
            const keyName = activeServerId === "1" ? "otp_key_reseller" : "otp_key_smscode";
            const key = localStorage.getItem(keyName); if (!key) return;
            
            try {
                let data;
                if (activeServerId === "1") {
                    data = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/services.php?country_id=7&api_key=${key}&t=${Date.now()}`);
                } else {
                    // GET Services SMSCode.gg
                    data = await fetchSmartProxy(`https://api.smscode.gg/v1/services?t=${Date.now()}`, false, null, key);
                }
                
                if (data.error || data.message) printLog(`[Srv ${activeServerId}] Info Services: ` + (data.message || data.error));

                let listArray = Array.isArray(data) ? data : (data.services || data.data || data.result || []);
                globalListLayanan = listArray; 
                renderDaftarLayanan();
            } catch (e) { printLog("Gagal ambil layanan: " + e.message); }
        }

        function renderDaftarLayanan() {
            const container = document.getElementById("listLayananRender");
            const keyword = document.getElementById("cariLayanan").value.toLowerCase();
            
            let filtered = globalListLayanan.filter(item => {
                let nama = String(item.name || item.service_name || item.title || item.layanan || "").toLowerCase();
                return nama.includes(keyword);
            });

            if (filtered.length > 0) {
                let html = "";
                filtered.forEach((item, index) => {
                    let id = String(item.product_id || item.id || item.service_id || item.code || "");
                    let name = item.name || item.service_name || item.title || item.layanan || "Layanan";
                    let price = parseInt(item.price || item.cost || item.harga || item.rate || 0);
                    let stock = parseInt(item.stock ?? item.stok ?? item.available ?? item.qty ?? 9999);

                    let isSelected = (idLayananTerpilih === id);
                    if (!idLayananTerpilih && index === 0) {
                        idLayananTerpilih = id; namaLayananTerpilih = name; hargaLayananTerpilih = price; isSelected = true;
                    }

                    if (isSelected) {
                        hargaLayananTerpilih = price;
                        document.getElementById("txtLayananTerpilihHeader").innerHTML = `${name} — <span style="color:#00ffcc;">Rp ${harga.toLocaleString('id-ID')}</span>`;
                    }

                    html += `
                        <div class="opsi-shopee ${isSelected ? "terpilih" : ""}" onclick="pilihOpsiShopee('${id}', '${name}', ${price})">
                            <div style="font-size: 13px; font-weight: 600; color: #fff;">
                                ${name} <span style="color: #8b8da9; font-size: 11px;">(${stock} stok)</span>
                            </div>
                            <div style="color: #b4b7ff; font-weight: bold; font-size: 13px;">Rp ${price.toLocaleString('id-ID')}</div>
                        </div>`;
                });
                container.innerHTML = html;
            } else {
                container.innerHTML = `<div style="padding: 20px; text-align: center; color: #8b8da9; font-style: italic;">Layanan tidak ditemukan/Kosong...</div>`;
            }
        }

        function pilihOpsiShopee(id, nama, harga) {
            idLayananTerpilih = id; namaLayananTerpilih = nama; hargaLayananTerpilih = harga;
            document.getElementById("txtLayananTerpilihHeader").innerHTML = `${nama} — <span style="color:#00ffcc;">Rp ${harga.toLocaleString('id-ID')}</span>`;
            renderDaftarLayanan(); toggleMekanismeDropdown();
        }

        // ======================== API: PESAN NOMOR BARU ========================
        async function prosesPesanSekarang() {
            const keyName = activeServerId === "1" ? "otp_key_reseller" : "otp_key_smscode";
            const apiKey = localStorage.getItem(keyName);
            if(!idLayananTerpilih) { alert("Pilih layanan terlebih dahulu!"); return; }
            if(!apiKey) { toggleApiKeyDropdown(); return; }

            const btn = document.getElementById("btnPesanUtama");
            const teksAsli = btn.innerHTML; btn.disabled = true; btn.innerHTML = `Memproses Order...`;
            printLog(`Meminta nomor dari Server ${activeServerId}...`);
            
            try {
                let data;
                if (activeServerId === "1") {
                    data = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/order.php?api_key=${apiKey}`, true, {
                        api_key: apiKey, product_id: idLayananTerpilih, country_id: 7
                    });
                } else {
                    data = await fetchSmartProxy(`https://api.smscode.gg/v1/order`, true, {
                        service: idLayananTerpilih, country: "ID"
                    }, apiKey);
                }

                if (data.order_id || data.phone || data.id || (data.status && (data.status === true || data.status === "success"))) {
                    let oid = data.order_id || data.id || "ORD-" + Date.now();
                    let nomer = data.phone || data.number || data.nomor || "Proses...";
                    
                    let orderBaru = {
                        order_id: oid, phone: nomer, layanan: namaLayananTerpilih, server_id: activeServerId,
                        harga: hargaLayananTerpilih, waktu_dibuat: Date.now(), status: "pending", otp: ""                  
                    };
                    daftarOrderan.unshift(orderBaru); renderUILayout(); simpanDaftarOrderanKeLokal();
                    printLog(`Nomor ${nomer} didapat! Cek OTP 2 detik...`); ambilSaldoLive();
                } else { 
                    alert(`Gagal: ${data.message || data.msg || data.error || 'Server sibuk'}`); 
                    printLog(`Info Order: ${data.message || data.error || 'Error'}`);
                }
            } catch (e) { alert("Error koneksi: " + e.message); }
            finally { btn.disabled = false; btn.innerHTML = teksAsli; }
        }

        // ======================== API: BATALKAN ORDER ========================
        async function eksekusiBatalkanServer(index) {
            const item = daftarOrderan[index];
            const keyName = item.server_id === "1" ? "otp_key_reseller" : "otp_key_smscode";
            const apiKey = localStorage.getItem(keyName); if (!apiKey) return;
            
            try {
                let res;
                if (item.server_id === "1") {
                    res = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/cancel.php?order_id=${item.order_id}&api_key=${apiKey}`, true, { api_key: apiKey, order_id: item.order_id });
                } else {
                    res = await fetchSmartProxy(`https://api.smscode.gg/v1/cancel/${item.order_id}`, true, {}, apiKey);
                }
                
                item.status = "cancelled"; showToast("Berhasil Dibatalkan! ✨");
                renderUILayout(); simpanDaftarOrderanKeLokal(); await ambilSaldoLive();
            } catch (e) { alert("⚠️ Gagal membatalkan pesanan."); }
        }

        // ======================== API: CHECK OTP / SMS ========================
        async function mesinCekSmsTerpusat() {
            daftarOrderan.forEach(async (i) => {
                if (i.status !== "pending") return; 
                const keyName = i.server_id === "1" ? "otp_key_reseller" : "otp_key_smscode";
                const k = localStorage.getItem(keyName); if (!k) return;
                
                try {
                    let d;
                    if (i.server_id === "1") {
                        d = await fetchSmartProxy(`https://otpinstan.com/api/reseller/s1/check.php?order_id=${i.order_id}&api_key=${k}`);
                    } else {
                        d = await fetchSmartProxy(`https://api.smscode.gg/v1/check/${i.order_id}`, false, null, k);
                    }
                    
                    if (d.status === "received" || d.status === "success" || d.otp || d.sms || d.code) {
                        i.status = "received"; i.otp = d.otp || d.sms || d.code || "BERHASIL"; 
                        putarSuaraNotif();
                        
                        if (window.cordova && cordova.plugins && cordova.plugins.notification) {
                            cordova.plugins.notification.local.schedule({
                                id: Math.floor(Date.now() / 1000), title: `🎉 OTP MASUK (${i.layanan})`,
                                text: `KODE OTP: ${i.otp}  (No: ${i.phone})`, foreground: true, vibrate: true, priority: 2, wakeup: true
                            });
                        }
                        renderUILayout(); simpanDaftarOrderanKeLokal(); printLog(`🎉 OTP MASUK (${i.otp})!`);
                    } else if (d.status === "cancelled" || d.status === "expired" || d.status === "timeout") {
                        i.status = "cancelled"; renderUILayout(); simpanDaftarOrderanKeLokal(); ambilSaldoLive();
                    }
                } catch (e) {}
            });
        }

        // ======================== FUNGSI UI & LAINNYA ========================
        function renderUILayout() {
            const container = document.getElementById("containerListOrder");
            if (daftarOrderan.length === 0) { container.innerHTML = `<div id="panelKosong" style="text-align: center; padding: 30px 10px; color: #6272a4; font-style: italic; font-size: 13px;">Belum ada pesanan aktif.</div>`; return; }
            
            let html = ""; let flagSimpan = false;
            daftarOrderan.forEach((item, index) => {
                let sec = Math.floor((Date.now() - item.waktu_dibuat) / 1000);
                if (item.status === "pending" && sec >= 1200) { item.status = "cancelled"; flagSimpan = true; }
                let sisa = Math.max(0, 1200 - sec); let cool = Math.max(0, 120 - sec);
                
                let textStat = `⚡ Server ${item.server_id} Cek OTP... (${sec}s)`; let colStat = "#ffb86c"; let kotakOtp = "";
                if (item.status === "received") { 
                    textStat = `🎉 SMS/OTP Diterima!`; colStat = "#50fa7b"; 
                    kotakOtp = `<div class="box-copy-statik otp-masuk"><div><div style="font-size:10px; color:#50fa7b; font-weight:bold;">Kode OTP Masuk:</div><div style="font-size:22px; font-weight:bold; color:#50fa7b;">${item.otp}</div></div><button onclick="salinTeksToast('${item.otp}')" class="btn-copy-static btn-green"><i class="fa-regular fa-copy"></i> Salin OTP</button></div>`;
                } else if (item.status === "cancelled") { textStat = "❌ Dibatalkan / Expired"; colStat = "#ff5555"; }
                
                html += `
                    <div class="card-order">
                        <div style="display:flex; justify-content:space-between; font-size:11px; color:#aaa; margin-bottom:6px;">
                            <span>Srv ${item.server_id} · ${item.layanan} (Rp ${(item.harga || 0).toLocaleString('id-ID')})</span>
                            <span>⏱️ ${Math.floor(sisa/60)}m ${sisa%60}s</span>
                        </div>
                        <div class="box-copy-statik">
                            <div><div style="font-size:10px; color:#8b8da9;">Nomor Handphone:</div><div style="font-size:18px; font-weight:bold; color:#fff; margin-top:2px;">${item.phone}</div></div>
                            <button onclick="salinTeksToast('${item.phone}')" class="btn-copy-static"><i class="fa-regular fa-copy"></i> Salin</button>
                        </div>
                        ${kotakOtp}
                        <div style="font-size:12px; font-weight:600; color:${colStat}; margin-top:8px;">${textStat}</div>
                        ${item.status === "pending" ? `<button class="btn-batal" ${cool>0?'disabled':''} onclick="eksekusiBatalkanServer(${index})">${cool>0?`Batalkan (Tunggu ${cool}s)`:'❌ Batalkan Pesanan'}</button>` : ''}
                    </div>`;
            });
            container.innerHTML = html; if (flagSimpan) simpanDaftarOrderanKeLokal();
        }

        function simpanDaftarOrderanKeLokal() { localStorage.setItem("daftar_orderan_live", JSON.stringify(daftarOrderan)); }
        function hapusRiwayatSelesai() { daftarOrderan = daftarOrderan.filter(i => i.status === "pending"); renderUILayout(); simpanDaftarOrderanKeLokal(); showToast("Layar Dibersihkan! ✨"); }
        function salinTeksToast(txt) { navigator.clipboard.writeText(txt); showToast("Berhasil Disalin! 📋"); }
        function showToast(m) { const t = document.getElementById('toastNotif'); t.innerText = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2000); }
        function printLog(t) { const c = document.getElementById("miniConsoleLog"); c.innerHTML += `<br>└> ${t}`; c.scrollTop = c.scrollHeight; }
        function mesinWaktuTerpusat() { if (daftarOrderan.some(i => i.status === "pending")) renderUILayout(); }

        function putarSuaraNotif() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                let now = ctx.currentTime;
                [1046.50, 1318.51, 1567.98, 2093.00].forEach((freq, idx) => {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.5, now + (idx * 0.15)); gain.gain.exponentialRampToValueAtTime(0.01, now + (idx * 0.15) + 0.15);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(now + (idx * 0.15)); osc.stop(now + (idx * 0.15) + 0.15);
                });
            } catch(e){}
        }
    </script>
</body>
