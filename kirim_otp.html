<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Otomatis Multi-OTP & Saldo Live</title>
    <style>
        body {
            background-color: #0b0c10;
            margin: 0;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f8f8f2;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #0f111a;
            border-radius: 12px;
            border: 1px solid #383a59;
            padding: 20px;
            box-sizing: border-box;
        }
        .card-order {
            background: #1e1f29;
            border: 1px solid #282a36;
            border-radius: 10px;
            padding: 15px;
            margin-top: 15px;
            position: relative;
        }
        .btn-batal {
            background: #ff5555;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-batal:disabled {
            background: #44475a;
            color: #888;
            cursor: not-allowed;
        }
        /* Style Tambahan untuk Tabel Harga */
        .tabel-harga {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }
        .tabel-harga th {
            background: #1e1f29;
            color: #00ffcc;
            text-align: left;
            padding: 8px;
            border-bottom: 2px solid #383a59;
            font-size: 11px;
            text-transform: uppercase;
        }
        .tabel-harga td {
            padding: 10px 8px;
            border-bottom: 1px solid #282a36;
        }
        .stok-aman { color: #50fa7b; font-weight: bold; }
        .stok-habis { color: #ff5555; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER DENGAN TAMPILAN SALDO LIVE -->
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1e1f29; padding-bottom: 12px; margin-bottom: 15px;">
            <h3 style="color: #00ffcc; margin: 0; font-size: 16px; letter-spacing: 1px;">📬 PESAN OTP</h3>
            
            <div style="background: #1e1f29; border: 1px solid #383a59; padding: 6px 14px; border-radius: 20px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; color: #50fa7b; box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);">
                👛 <span id="txtSaldoLive">Rp 0</span>
                <span onclick="refreshSemuaDataLive()" style="cursor: pointer; font-size: 12px; color: #00ffcc; margin-left: 5px;" title="Refresh Saldo & Harga">🔄</span>
            </div>
        </div>

        <!-- INPUT API KEY -->
        <div style="background: #1e1f29; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #282a36;">
            <label style="font-size: 11px; color: #00ffcc; font-weight: bold;">🔑 Kode API Key Anda:</label>
            <div style="display: flex; margin-top: 5px; gap: 8px;">
                <input type="password" id="otpKeyV5" placeholder="Masukkan token API Key" style="flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #0f111a; color: #fff; font-size: 13px;">
                <button onclick="simpanKeyV5()" style="padding: 10px 12px; background: #00ffcc; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 12px;">Simpan</button>
            </div>
            <small id="statusKeyV5" style="color: #ff5555; font-size: 11px; display: block; margin-top: 6px;">⚠️ API Key belum aktif.</small>
        </div>

        <!-- FORM ORDER -->
        <div style="background: #1e1f29; padding: 15px; border-radius: 8px; border: 1px solid #282a36;">
            <div style="margin-bottom: 12px;">
                <label style="font-size: 12px; color: #aaa;">Pilih Layanan Target:</label>
                <select id="selectLayananLive" style="width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; background: #0f111a; color: #fff; border: 1px solid #444; font-size: 14px; box-sizing: border-box;">
                    <option value="">🔄 Memuat layanan...</option>
                </select>
            </div>
            <button onclick="prosesPesanSekarang()" style="width: 100%; padding: 12px; background: #6272a4; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; box-shadow: 0 3px 6px rgba(0,0,0,0.2);">
                🛒 Pesan Sekarang
            </button>
        </div>

        <!-- 🔥 BARU: TABEL MONITORING DAFTAR HARGA & STOK LIVE -->
        <div style="background: #1e1f29; padding: 15px; border-radius: 8px; border: 1px solid #282a36; margin-top: 15px;">
            <div style="font-size: 13px; font-weight: bold; color: #00ffcc; display: flex; align-items: center; gap: 6px;">
                📊 Daftar Harga & Stok Terkini (Server 1)
            </div>
            <table class="tabel-harga">
                <thead>
                    <tr>
                        <th>Aplikasi</th>
                        <th>Harga</th>
                        <th>Sisa Stok</th>
                    </tr>
                </thead>
                <tbody id="tbodyDaftarHarga">
                    <tr>
                        <td colspan="3" style="text-align: center; color: #6272a4; font-style: italic; padding: 15px 0;">
                            Menghubungkan ke API server...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- AREA DAFTAR NOMOR -->
        <div style="margin-top: 20px; border-top: 2px dashed #282a36; padding-top: 10px;">
            <div style="font-size: 14px; font-weight: bold; color: #50fa7b; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;">
                <span>📱 Nomor & OTP Aktif:</span>
                <span onclick="hapusRiwayatSelesai()" style="cursor: pointer; font-size: 11px; color: #ff5555; background: #1e1f29; padding: 4px 10px; border-radius: 5px; border: 1px solid #383a59; font-weight: normal;">🧹 Bersihkan</span>
            </div>
            <div id="containerListOrder">
                <div id="panelKosong" style="text-align: center; padding: 30px 10px; color: #6272a4; font-style: italic; font-size: 13px;">
                    Belum ada pesanan aktif. Klik pesan di atas untuk mengantre nomor.
                </div>
            </div>
        </div>

        <!-- KOTAK LOG CONSOLE -->
        <div id="miniConsoleLog" style="margin-top: 15px; padding: 8px; background: #0f111a; border-radius: 4px; font-family: monospace; font-size: 11px; color: #50fa7b; border: 1px solid #282a36; word-break: break-all; max-height: 80px; overflow-y: auto;">
            └> System Ready.
        </div>
    </div>

    <script>
        let daftarOrderan = []; 
        let saldoSekarangGlobal = 0;

        document.addEventListener("DOMContentLoaded", function() {
            const savedKey = localStorage.getItem("otp_key_reseller");
            if(savedKey) {
                document.getElementById("otpKeyV5").value = savedKey;
                document.getElementById("statusKeyV5").innerText = "✅ API Key Terkunci & Aktif.";
                document.getElementById("statusKeyV5").style.color = "#50fa7b";
                refreshSemuaDataLive();
            } else {
                muatMenuLayananManual(); 
            }

            const orderanLokal = localStorage.getItem("daftar_orderan_live");
            if (orderanLokal) {
                daftarOrderan = JSON.parse(orderanLokal);
                renderUILayout();
            }

            setInterval(mesinWaktuTerpusat, 1000);
            setInterval(mesinCekSmsTerpusat, 5000);
        });

        function simpanKeyV5() {
            const key = document.getElementById("otpKeyV5").value.trim();
            if(!key) { alert("Masukkan API Key Anda!"); return; }
            localStorage.setItem("otp_key_reseller", key);
            document.getElementById("statusKeyV5").innerText = "✅ API Key Berhasil Disimpan!";
            document.getElementById("statusKeyV5").style.color = "#50fa7b";
            refreshSemuaDataLive();
        }

        function refreshSemuaDataLive() {
            ambilSaldoLive();
            ambilLayananLive();
        }

        function simpanDaftarOrderanKeLokal() {
            localStorage.setItem("daftar_orderan_live", JSON.stringify(daftarOrderan));
        }

        // FUNGSI UTAMA: MENAMPILKAN HARGA & STOK DI DROPDOWN SEKALIGUS DI TABEL MONITOR
        async function ambilLayananLive() {
            const apiKey = localStorage.getItem("otp_key_reseller");
            const selectEl = document.getElementById("selectLayananLive");
            const tbodyHarga = document.getElementById("tbodyDaftarHarga");
            if (!apiKey) return;

            const URL_SERVICES = "https://corsproxy.io/?https://otpinstan.com/api/reseller/services.php?country_id=7&t=" + Date.now();

            try {
                const response = await fetch(URL_SERVICES, {
                    method: "GET",
                    headers: { "X-Api-Key": apiKey }
                });
                const data = await response.json();
                
                let listLayanan = Array.isArray(data) ? data : (data.services || data.data || []);
                
                if (listLayanan.length > 0) {
                    let htmlOptions = "";
                    let htmlTabel = "";

                    listLayanan.forEach(item => {
                        let id = item.id || item.platform_id || item.service_id;
                        let name = item.name || item.service_name || item.title;
                        let price = parseInt(item.price || item.cost || item.harga || 0);
                        let stock = item.stock !== undefined ? parseInt(item.stock) : parseInt(item.available || 0);
                        
                        if (id && name) {
                            // 1. Masukkan ke susunan dropdown atas
                            htmlOptions += `<option value="${id}" data-nama="${name}" data-harga="${price}">Server 1 · ${name} - Rp ${price.toLocaleString('id-ID')} (Stok: ${stock})</option>`;
                            
                            // 2. Masukkan ke baris tabel monitor bawah dengan warna dinamis
                            let kelasStok = stock > 0 ? "stok-aman" : "stok-habis";
                            let teksStok = stock > 0 ? `${stock} Pcs` : "🔴 Habis";

                            htmlTabel += `
                                <tr>
                                    <td style="font-weight:bold;">📱 ${name}</td>
                                    <td style="color:#ffb86c;">Rp ${price.toLocaleString('id-ID')}</td>
                                    <td class="${kelasStok}">${teksStok}</td>
                                </tr>
                            `;
                        }
                    });

                    selectEl.innerHTML = htmlOptions;
                    tbodyHarga.innerHTML = htmlTabel;
                    printLog("Harga & Sisa Stok sinkron otomatis dengan server.");
                } else {
                    muatMenuLayananManual();
                }
            } catch (error) {
                muatMenuLayananManual();
                printLog("Gagal sinkron harga server, memakai data lokal.");
            }
        }

        // CADANGAN LOKAL (Jika API Server offline, tabel & dropdown tidak akan kosong melongpong)
        function muatMenuLayananManual() {
            document.getElementById("selectLayananLive").innerHTML = `
                <option value="21" data-nama="Shopee" data-harga="340">Server 1 · Shopee - Rp 340</option>
                <option value="1" data-nama="WhatsApp" data-harga="1400">Server 1 · WhatsApp - Rp 1.400</option>
                <option value="2" data-nama="Telegram" data-harga="950">Server 1 · Telegram - Rp 950</option>
                <option value="5" data-nama="TikTok" data-harga="415">Server 1 · TikTok - Rp 415</option>
            `;
            
            document.getElementById("tbodyDaftarHarga").innerHTML = `
                <tr><td>📱 Shopee</td><td style="color:#ffb86c;">Rp 340</td><td class="stok-aman">Ready</td></tr>
                <tr><td>📱 WhatsApp</td><td style="color:#ffb86c;">Rp 1.400</td><td class="stok-aman">Ready</td></tr>
                <tr><td>📱 Telegram</td><td style="color:#ffb86c;">Rp 950</td><td class="stok-aman">Ready</td></tr>
                <tr><td>📱 TikTok</td><td style="color:#ffb86c;">Rp 415</td><td class="stok-aman">Ready</td></tr>
            `;
        }

        async function ambilSaldoLive() {
            const apiKey = localStorage.getItem("otp_key_reseller");
            if (!apiKey) return;

            const URL_BAL = "https://corsproxy.io/?https://otpinstan.com/api/reseller/balance.php?t=" + Date.now();

            try {
                const response = await fetch(URL_BAL, { method: "GET", headers: { "X-Api-Key": apiKey } });
                const teksResponMurni = await response.text();
                const data = JSON.parse(teksResponMurni);
                let nominalSaldo = data.balance || data.saldo || data.balance_reseller || (data.data ? data.data.balance : 0) || 0;
                saldoSekarangGlobal = parseInt(nominalSaldo);
                document.getElementById("txtSaldoLive").innerText = "Rp " + saldoSekarangGlobal.toLocaleString("id-ID");
            } catch (error) {
                ambilSaldoJalurDua(apiKey);
            }
        }

        async function ambilSaldoJalurDua(apiKey) {
            const URL_ALT = "https://corsproxy.io/?https://otpinstan.com/api/reseller/profile.php?t=" + Date.now();
            try {
                const response = await fetch(URL_ALT, { method: "GET", headers: { "X-Api-Key": apiKey } });
                const data = await response.json();
                let nominal = data.balance || data.saldo || 0;
                saldoSekarangGlobal = parseInt(nominal);
                document.getElementById("txtSaldoLive").innerText = "Rp " + saldoSekarangGlobal.toLocaleString("id-ID");
            } catch(e) {}
        }

        async function prosesPesanSekarang() {
            const apiKey = localStorage.getItem("otp_key_reseller");
            const selectEl = document.getElementById("selectLayananLive");
            const platformId = selectEl.value;
            
            if(!platformId) { alert("Pilih layanan terlebih dahulu!"); return; }
            if(!apiKey) { alert("Simpan API Key dahulu!"); return; }

            const namaLayanan = selectEl.options[selectEl.selectedIndex].getAttribute("data-nama");
            const hargaLayanan = parseInt(selectEl.options[selectEl.selectedIndex].getAttribute("data-harga"));

            printLog(`Meminta nomor baru untuk ${namaLayanan}...`);
            const URL_ORDER = "https://corsproxy.io/?https://otpinstan.com/api/reseller/s1/order.php?t=" + Date.now();

            try {
                const response = await fetch(URL_ORDER, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "X-Api-Key": apiKey },
                    body: JSON.stringify({ platform_id: parseInt(platformId), country_id: 7 })
                });
                const data = await response.json();

                if (data.order_id || data.phone) {
                    
                    saldoSekarangGlobal -= hargaLayanan;
                    if(saldoSekarangGlobal < 0) saldoSekarangGlobal = 0;
                    document.getElementById("txtSaldoLive").innerText = "Rp " + saldoSekarangGlobal.toLocaleString("id-ID");

                    const orderBaru = {
                        order_id: data.order_id,
                        phone: data.phone,
                        layanan: namaLayanan,
                        waktu_dibuat: Date.now(), 
                        status: "pending",       
                        otp: ""                  
                    };

                    daftarOrderan.unshift(orderBaru); 
                    renderUILayout();                 
                    simpanDaftarOrderanKeLokal();
                    printLog(`Sukses mendapat nomor ${data.phone}`);
                    
                    setTimeout(refreshSemuaDataLive, 3000);
                } else {
                    alert(`Gagal: ${data.message || 'Stok nomor kosong / Cek saldo'}`);
                }
            } catch (error) {
                printLog("Error koneksi/CORS: " + error.message);
            }
        }

        function renderUILayout() {
            const container = document.getElementById("containerListOrder");
            if (daftarOrderan.length === 0) {
                container.innerHTML = `<div id="panelKosong" style="text-align: center; padding: 30px 10px; color: #6272a4; font-style: italic; font-size: 13px;">Belum ada pesanan aktif.</div>`;
                return;
            }

            let htmlString = "";
            let dataHarusDisimpanUlang = false;

            daftarOrderan.forEach((item, index) => {
                let detikBerlalu = Math.floor((Date.now() - item.waktu_dibuat) / 1000);
                
                if (item.status === "pending" && detikBerlalu >= 1200) {
                    item.status = "cancelled";
                    dataHarusDisimpanUlang = true;
                }

                let sisaValid = 1200 - detikBerlalu;
                if (sisaValid < 0) sisaValid = 0;

                let cooldownBatal = 120 - detikBerlalu;
                if (cooldownBatal < 0) cooldownBatal = 0;

                const m = Math.floor(sisaValid / 60);
                const s = sisaValid % 60;
                const teksValiditas = sisaValid > 0 ? `${m}m ${s}s` : "Expired";

                let statusSmsText = `🔄 Menunggu SMS... (${detikBerlalu}s)`;
                let statusColor = "#ffb86c";
                
                if (item.status === "received") {
                    statusSmsText = `🎉 OTP: <span style="background:#50fa7b; color:#000; padding:2px 8px; border-radius:4px; font-weight:bold; font-size:16px;">${item.otp}</span>`;
                    statusColor = "#50fa7b";
                } else if (item.status === "cancelled") {
                    statusSmsText = "❌ Dibatalkan / Expired";
                    statusColor = "#ff5555";
                }

                htmlString += `
                    <div class="card-order">
                        <div style="font-size:11px; color:#aaa;">Server 1 · ${item.layanan}</div>
                        <div style="font-size:20px; font-weight:bold; color:#fff; margin:5px 0; display:flex; align-items:center; gap:8px;">
                            ${item.phone}
                            <span onclick="salinNomor('${item.phone}')" style="cursor:pointer; font-size:14px; color:#00ffcc;">📋</span>
                        </div>
                        
                        <div style="font-size:13px; color:${statusColor}; margin-top:5px;">
                            ${statusSmsText}
                        </div>
                        
                        <div style="font-size:11px; color:#ffb86c; margin-top:5px;">
                            ⏱️ Sisa Waktu: ${teksValiditas}
                        </div>

                        ${item.status === "pending" ? `
                            <button class="btn-batal" id="btnBatal-${index}" ${cooldownBatal > 0 ? 'disabled' : ''} onclick="eksekusiBatalkanServer(${index})">
                                ${cooldownBatal > 0 ? `Batalkan (${cooldownBatal}s)` : '❌ Batalkan Pesanan'}
                            </button>
                        ` : ''}
                    </div>
                `;
            });

            container.innerHTML = htmlString;
            if (dataHarusDisimpanUlang) simpanDaftarOrderanKeLokal();
        }

        function mesinWaktuTerpusat() {
            let adaPending = daftarOrderan.some(item => item.status === "pending");
            if (adaPending) renderUILayout();
        }

        async function mesinCekSmsTerpusat() {
            const apiKey = localStorage.getItem("otp_key_reseller");
            if (!apiKey) return;

            daftarOrderan.forEach(async (item) => {
                if (item.status !== "pending") return; 

                const URL_CHECK = `https://corsproxy.io/?https://otpinstan.com/api/reseller/s1/check.php?order_id=${item.order_id}&t=` + Date.now();
                
                try {
                    const response = await fetch(URL_CHECK, { method: "GET", headers: { "X-Api-Key": apiKey } });
                    const data = await response.json();

                    if (data.status === "received" || data.otp) {
                        item.status = "received";
                        item.otp = data.otp;
                        renderUILayout();
                        simpanDaftarOrderanKeLokal();
                        printLog(`[SMS] Nomor ${item.phone} menerima OTP!`);
                        setTimeout(refreshSemuaDataLive, 2000);
                    } else if (data.status === "cancelled" || data.status === "expired") {
                        item.status = "cancelled";
                        renderUILayout();
                        simpanDaftarOrderanKeLokal();
                        setTimeout(refreshSemuaDataLive, 2000);
                    }
                } catch (e) {}
            });
        }

        async function eksekusiBatalkanServer(index) {
            const item = daftarOrderan[index];
            item.status = "cancelled";
            renderUILayout();
            simpanDaftarOrderanKeLokal();
            printLog(`Nomor ${item.phone} dibatalkan.`);
            setTimeout(refreshSemuaDataLive, 2000);
        }

        function hapusRiwayatSelesai() {
            daftarOrderan = daftarOrderan.filter(item => item.status === "pending");
            renderUILayout();
            simpanDaftarOrderanKeLokal();
            printLog("Riwayat nomor selesai telah dibersihkan.");
        }

        function salinNomor(num) {
            navigator.clipboard.writeText(num);
            printLog(`Nomor ${num} disalin!`);
        }

        function printLog(text) {
            document.getElementById("miniConsoleLog").innerText = "└> " + text;
        }
    </script>
</body>
</html>
