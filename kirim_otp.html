<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel OTP Shopee</title>
    <style>
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { 
            background-color: #0b0c16; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 15px; 
        }
        
        /* Kartu Saldo Header */
        .header-saldo {
            background: #16172e;
            border: 1px solid #2c2e5c;
            border-left: 4px solid #00ffcc;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .btn-refresh {
            background: #25264a;
            border: 1px solid #3d3463;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-refresh:hover { background: #3d3463; border-color: #00ffcc; }

        /* Dropdown API Key */
        .pemicu-api-dropdown {
            background: #1a1535;
            border: 1px solid #3d3463;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            color: #d6c7ff;
            margin-bottom: 15px;
            user-select: none;
        }
        .pemicu-api-dropdown:hover {
            border-color: #00ffcc;
            background: #251e4a;
            color: #00ffcc;
        }
        #wadahApiKeyDropdown {
            display: none;
            background: #120e24;
            border: 1px solid rgba(0, 255, 204, 0.3);
            border-radius: 8px;
            padding: 15px;
            margin-top: -8px;
            margin-bottom: 15px;
        }

        /* Layanan & Tombol Pesan */
        .box-layanan {
            background: #16172e;
            border: 1px solid #2c2e5c;
            padding: 12px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #fff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .btn-pesan {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #5f27cd, #341f97);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(95, 39, 205, 0.4);
            letter-spacing: 0.5px;
        }
        .btn-pesan:hover { background: linear-gradient(45deg, #6c5ce7, #5f27cd); box-shadow: 0 4px 20px rgba(0, 255, 204, 0.3); }

        /* Kartu Riwayat SMS */
        .sms-card { 
            background: #16172e; 
            border-left: 4px solid #6272a4; 
            padding: 12px; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .sms-card.received { border-left-color: #50fa7b; }
        .sms-card.pending { border-left-color: #ffb86c; }
        .otp-text { font-size: 18px; font-weight: bold; color: #fff; letter-spacing: 2px; }
        .btn-copy { background: #6c5ce7; border: none; color: white; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .btn-copy:hover { background: #00ffcc; color: #0b0c16; }

        input { width: 100%; padding: 10px; border-radius: 6px; background: #15102a; border: 1px solid #3d3463; color: #fff; font-size: 13px; outline: none; }
        input:focus { border-color: #00ffcc; }
    </style>
</head>
<body>

    <!-- 1. HEADER SALDO (TETAP TAMPIL) -->
    <div class="header-saldo">
        <div style="display: flex; align-items: center; gap: 10px;">
            <span style="font-size: 20px;">💰</span>
            <div>
                <div style="font-size: 11px; color: #8a8dab; font-weight: bold;">SISA SALDO AKTIF</div>
                <div style="font-size: 16px; font-weight: bold; color: #50fa7b;" id="saldo">Rp 0</div>
            </div>
        </div>
        <button onclick="refreshData()" class="btn-refresh" title="Refresh Saldo">🔄</button>
    </div>

    <!-- 2. DROPDOWN API KEY -->
    <div>
        <div class="pemicu-api-dropdown" onclick="toggleApiKey()">
            <span>🔑 Konfigurasi API Key</span>
            <span id="panahApiKey" style="font-size: 11px;">▼</span>
        </div>

        <div id="wadahApiKeyDropdown">
            <div style="font-size: 12px; font-weight: bold; color: #00ffcc; margin-bottom: 8px;">
                Masukkan Kode API Key Anda:
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                <input type="password" id="apiKey" placeholder="Paste API Key di sini...">
                <button onclick="saveKey()" style="background: #00ffcc; color: #0b0c16; font-weight: bold; border: none; padding: 0 16px; border-radius: 6px; cursor: pointer; font-size: 13px;">Simpan</button>
            </div>
            <div style="font-size: 11px; color: #50fa7b;">
                <span id="statusKey">💡 Klik Simpan untuk mengaktifkan API Key.</span>
            </div>
        </div>
    </div>

    <!-- 3. LAYANAN & TOMBOL PESAN (RINGKAS TANPA NEGARA/PROMO) -->
    <div style="margin-bottom: 5px; font-size: 12px; color: #8a8dab; font-weight: bold;">LAYANAN TERPILIH:</div>
    <div class="box-layanan">
        <span>🛒 Shopee (Indonesia)</span>
        <span style="color: #00ffcc;">Rp 340</span>
    </div>

    <button onclick="orderShopee()" class="btn-pesan">
        ⚡ PESAN NOMOR SEKARANG
    </button>

    <!-- 4. DAFTAR NOMOR DAN OTP AKTIF -->
    <div style="margin-top: 25px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#8a8dab; font-size: 12px; font-weight: bold;">
            <span>📱 NOMOR &amp; OTP AKTIF</span>
            <span onclick="clearHistory()" style="cursor:pointer; color:#ff5555;">🧹 Bersihkan</span>
        </div>
        <div id="historyList"></div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('my_orders') || '[]');

        function toggleApiKey() {
            const wadah = document.getElementById("wadahApiKeyDropdown");
            const panah = document.getElementById("panahApiKey");
            if (wadah.style.display === "none" || wadah.style.display === "") {
                wadah.style.display = "block";
                panah.style.transform = "rotate(180deg)";
            } else {
                wadah.style.display = "none";
                panah.style.transform = "rotate(0deg)";
            }
        }

        function saveKey() {
            const val = document.getElementById('apiKey').value.trim();
            if(!val) { alert("API Key tidak boleh kosong!"); return; }
            localStorage.setItem('otp_key', val);
            alert("API Key Berhasil Disimpan!");
            document.getElementById('statusKey').innerText = "✅ API Key Terkunci & Aktif.";
            refreshData();
            toggleApiKey(); // Otomatis menutup dropdown setelah simpan
        }

        async function refreshData() {
            const key = localStorage.getItem('otp_key');
            if(!key) return;
            try {
                const res = await fetch(`https://corsproxy.io/?https://otpinstan.com/api/reseller/balance.php`, {headers: {'X-Api-Key': key}});
                const data = await res.json();
                document.getElementById('saldo').innerText = 'Rp ' + (data.saldo || 0);
            } catch(e) { console.log("Gagal ambil saldo"); }
        }

        async function orderShopee() {
            const key = localStorage.getItem('otp_key');
            if(!key) { 
                alert("Isi API Key terlebih dahulu di menu Konfigurasi API Key!"); 
                if(document.getElementById("wadahApiKeyDropdown").style.display !== "block") toggleApiKey();
                return; 
            }
            const res = await fetch(`https://corsproxy.io/?https://otpinstan.com/api/reseller/s1/order.php`, {
                method: 'POST',
                headers: {'X-Api-Key': key, 'Content-Type': 'application/json'},
                body: JSON.stringify({platform_id: 21, country_id: 7}) // Tetap otomatis ID 7 (Indonesia)
            });
            const data = await res.json();
            if(data.phone) {
                orders.unshift({id: data.order_id, phone: data.phone, status: 'pending', otp: ''});
                localStorage.setItem('my_orders', JSON.stringify(orders));
                render();
                refreshData(); // Refresh saldo setelah beli
            } else { alert("Gagal: " + (data.message || "Stok habis/Saldo tidak cukup")); }
        }

        function copyOTP(otp) {
            navigator.clipboard.writeText(otp);
            alert("OTP " + otp + " berhasil disalin!");
        }

        function render() {
            const list = document.getElementById('historyList');
            if(orders.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 20px; color:#6272a4; font-size:13px; border:1px dashed #2c2e5c; border-radius:8px;">Belum ada nomor aktif. Klik pesan di atas.</div>`;
                return;
            }
            list.innerHTML = orders.map(o => `
                <div class="sms-card ${o.otp ? 'received' : 'pending'}">
                    <div>
                        <div style="font-size:13px; font-weight:bold; color:#00ffcc;">${o.phone}</div>
                        <div class="otp-text" style="margin-top:4px;">${o.otp ? o.otp : '<span style="font-size:13px; color:#ffb86c; font-weight:normal;">Menunggu SMS...</span>'}</div>
                    </div>
                    ${o.otp ? `<button class="btn-copy" onclick="copyOTP('${o.otp}')">Salin</button>` : ''}
                </div>
            `).join('');
        }

        function clearHistory() { orders = []; localStorage.removeItem('my_orders'); render(); }
        
        // Loop otomatis cek SMS masuk tiap 5 detik
        setInterval(async () => {
            const key = localStorage.getItem('otp_key');
            if(!key) return;
            for(let o of orders) {
                if(o.status === 'pending') {
                    try {
                        const res = await fetch(`https://corsproxy.io/?https://otpinstan.com/api/reseller/s1/check.php?order_id=${o.id}`, {headers: {'X-Api-Key': key}});
                        const d = await res.json();
                        if(d.otp) { 
                            o.status = "received"; 
                            o.otp = d.otp; 
                            render(); 
                            localStorage.setItem('my_orders', JSON.stringify(orders)); 
                        }
                    } catch(e) {}
                }
            }
        }, 5000);

        window.onload = () => { 
            const savedKey = localStorage.getItem('otp_key');
            document.getElementById('apiKey').value = savedKey || ''; 
            if(savedKey) {
                document.getElementById('statusKey').innerText = "✅ API Key Terkunci & Aktif.";
            } else {
                toggleApiKey(); // Otomatis buka dropdown jika API key belum ada
            }
            render(); 
            refreshData(); 
        };
    </script>
</body>
</html>
